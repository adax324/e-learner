<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bazy danych — kolokwium — fiszki do nauki</title>
<style>
  :root {
    --bg: #14171c;
    --surface: #1c2128;
    --surface-2: #242a33;
    --border: #2d333d;
    --text: #e8eaed;
    --text-dim: #8b919a;
    --accent: #5b9dff;
    --accent-dim: #2c4670;
    --good: #4caf7d;
    --font-display: "Source Serif Pro", Georgia, "Times New Roman", serif;
    --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 64px;
  }

  header {
    width: 100%;
    max-width: 640px;
    margin-bottom: 28px;
  }

  h1 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 1.6rem;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }

  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
    gap: 12px;
  }

  .progress-track {
    flex: 1;
    height: 4px;
    background: var(--surface-2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.25s ease;
  }

  .counter {
    font-size: 0.85rem;
    color: var(--text-dim);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }

  main {
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .card {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 32px;
    min-height: 260px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 20px;
    cursor: pointer;
    transition: border-color 0.15s ease;
  }

  .card:hover { border-color: var(--accent-dim); }

  .category {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    font-weight: 600;
  }

  .term {
    font-family: var(--font-display);
    font-size: 1.7rem;
    line-height: 1.3;
    font-weight: 600;
  }

  .hint {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-top: auto;
  }

  .description {
    font-size: 1.02rem;
    line-height: 1.6;
    color: var(--text);
    border-top: 1px solid var(--border);
    padding-top: 20px;
    margin-top: 4px;
    white-space: pre-line;
  }

  .description.hidden { display: none; }
  .hint.hidden-when-revealed { display: none; }

  .controls {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 22px;
    gap: 10px;
  }

  button {
    font-family: var(--font-body);
    font-size: 0.9rem;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease;
  }

  button:hover { background: var(--surface-2); border-color: var(--accent-dim); }
  button:active { transform: translateY(1px); }
  button:disabled { opacity: 0.35; cursor: default; }

  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #0c1116;
    font-weight: 600;
  }
  button.primary:hover { background: #6fa8ff; }

  .icon-btn {
    padding: 10px 14px;
  }

  .nav-group {
    display: flex;
    gap: 8px;
  }

  .keyboard-hint {
    margin-top: 18px;
    font-size: 0.78rem;
    color: var(--text-dim);
    text-align: center;
  }

  .done-screen {
    width: 100%;
    text-align: center;
    padding: 60px 20px;
  }

  .done-screen h2 {
    font-family: var(--font-display);
    font-size: 1.5rem;
    margin-bottom: 8px;
  }

  .done-screen p {
    color: var(--text-dim);
    margin-bottom: 24px;
  }

  kbd {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 0.78rem;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.82rem;
    color: var(--text-dim);
    text-decoration: none;
    margin-bottom: 14px;
    transition: color 0.15s ease;
  }
  .back-link:hover { color: var(--accent); }
</style>
</head>

<header>
  <a href="../" class="back-link">← Lista materiałów</a>

 {
  "term": "Eventual Consistency",
  "description": "Model spójności oferowany przez część systemów NoSQL: system dopuszcza zwrócenie nie najnowszej informacji — dane po aktualizacji w jednym węźle propagują się do pozostałych z opóźnieniem, ale docelowo (eventually) wszystkie repliki osiągną ten sam stan. To cena rezygnacji z natychmiastowej spójności (C w teorii CAP) na rzecz dostępności (A) w systemach kategorii AP, jak Cassandra, Riak czy CouchDB.",
  "category": "Podział SZBD"
 }
];

  let order = [];
  let pos = 0;
  let revealed = false;

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function resetDeck(doShuffle) {
    order = doShuffle ? shuffle(FLASHCARDS_DATA.map((_, i) => i)) : FLASHCARDS_DATA.map((_, i) => i);
    pos = 0;
    revealed = false;
    render();
  }

  function currentCard() {
    return FLASHCARDS_DATA[order[pos]];
  }

  function render() {
    const card = currentCard();
    const cardArea = document.getElementById('cardArea');
    const controlsArea = document.getElementById('controlsArea');

    cardArea.innerHTML = `
      <div class="card" id="cardEl">
        ${card.category ? `<div class="category">${escapeHtml(card.category)}</div>` : ''}
        <div class="term">${escapeHtml(card.term)}</div>
        <div class="hint ${revealed ? 'hidden-when-revealed' : ''}">Kliknij albo wciśnij spację, żeby sprawdzić odpowiedź</div>
        <div class="description ${revealed ? '' : 'hidden'}">${escapeHtml(card.description)}</div>
      </div>
    `;

    document.getElementById('cardEl').addEventListener('click', toggleReveal);

    controlsArea.innerHTML = `
      <button id="shuffleBtn" class="icon-btn" title="Przetasuj fiszki">🔀 Przetasuj</button>
      <div class="nav-group">
        <button id="prevBtn" ${pos === 0 ? 'disabled' : ''}>← Poprzednia</button>
        <button id="revealBtn" class="primary">${revealed ? 'Ukryj' : 'Pokaż odpowiedź'}</button>
        <button id="nextBtn">${pos === order.length - 1 ? 'Zakończ' : 'Następna →'}</button>
      </div>
    `;

    document.getElementById('shuffleBtn').onclick = () => resetDeck(true);
    document.getElementById('prevBtn').onclick = goPrev;
    document.getElementById('revealBtn').onclick = toggleReveal;
    document.getElementById('nextBtn').onclick = goNext;

    document.getElementById('counter').textContent = `${pos + 1} / ${order.length}`;
    document.getElementById('progressFill').style.width = `${((pos + (revealed ? 1 : 0.3)) / order.length) * 100}%`;
  }

  function toggleReveal() {
    revealed = !revealed;
    render();
  }

  function goNext() {
    if (pos < order.length - 1) {
      pos++;
      revealed = false;
      render();
    } else {
      showDone();
    }
  }

  function goPrev() {
    if (pos > 0) {
      pos--;
      revealed = false;
      render();
    }
  }

  function showDone() {
    document.getElementById('cardArea').innerHTML = `
      <div class="done-screen">
        <h2>To wszystkie fiszki w tej talii 🎉</h2>
        <p>Możesz przejść jeszcze raz w nowej losowej kolejności.</p>
      </div>
    `;
    document.getElementById('controlsArea').innerHTML = `
      <div class="nav-group" style="margin: 0 auto;">
        <button id="restartBtn" class="primary">Zacznij od nowa (nowa kolejność)</button>
      </div>
    `;
    document.getElementById('restartBtn').onclick = () => resetDeck(true);
    document.getElementById('progressFill').style.width = '100%';
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); toggleReveal(); }
    if (e.code === 'ArrowRight') goNext();
    if (e.code === 'ArrowLeft') goPrev();
  });

  resetDeck(true);
</script>

</body>
</html>
