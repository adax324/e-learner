<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matematyka — zaliczenie (funkcje, pochodne, nierówności) — fiszki do nauki</title>
<style>
  :root {
    --bg: #14171c;
    --surface: #1c2128;
    --surface-2: #242a33;
    --border: #2d333d;
    --text: #e8eaed;
    --text-dim: #8b919a;
    --accent: #5b9dff;
    --accent-dim: #2c4670;
    --good: #4caf7d;
    --font-display: "Source Serif Pro", Georgia, "Times New Roman", serif;
    --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 64px;
  }

  header {
    width: 100%;
    max-width: 640px;
    margin-bottom: 28px;
  }

  h1 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 1.6rem;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }

  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
    gap: 12px;
  }

  .progress-track {
    flex: 1;
    height: 4px;
    background: var(--surface-2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.25s ease;
  }

  .counter {
    font-size: 0.85rem;
    color: var(--text-dim);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }

  main {
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .card {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 32px;
    min-height: 260px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 20px;
    cursor: pointer;
    transition: border-color 0.15s ease;
  }

  .card:hover { border-color: var(--accent-dim); }

  .category {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    font-weight: 600;
  }

  .term {
    font-family: var(--font-display);
    font-size: 1.7rem;
    line-height: 1.3;
    font-weight: 600;
  }

  .hint {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-top: auto;
  }

  .description {
    font-size: 1.02rem;
    line-height: 1.6;
    color: var(--text);
    border-top: 1px solid var(--border);
    padding-top: 20px;
    margin-top: 4px;
    white-space: pre-line;
  }

  .description.hidden { display: none; }
  .hint.hidden-when-revealed { display: none; }

  .controls {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 22px;
    gap: 10px;
  }

  button {
    font-family: var(--font-body);
    font-size: 0.9rem;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease;
  }

  button:hover { background: var(--surface-2); border-color: var(--accent-dim); }
  button:active { transform: translateY(1px); }
  button:disabled { opacity: 0.35; cursor: default; }

  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #0c1116;
    font-weight: 600;
  }
  button.primary:hover { background: #6fa8ff; }

  .icon-btn {
    padding: 10px 14px;
  }

  .nav-group {
    display: flex;
    gap: 8px;
  }

  .keyboard-hint {
    margin-top: 18px;
    font-size: 0.78rem;
    color: var(--text-dim);
    text-align: center;
  }

  .done-screen {
    width: 100%;
    text-align: center;
    padding: 60px 20px;
  }

  .done-screen h2 {
    font-family: var(--font-display);
    font-size: 1.5rem;
    margin-bottom: 8px;
  }

  .done-screen p {
    color: var(--text-dim);
    margin-bottom: 24px;
  }

  kbd {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 0.78rem;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.82rem;
    color: var(--text-dim);
    text-decoration: none;
    margin-bottom: 14px;
    transition: color 0.15s ease;
  }
  .back-link:hover { color: var(--accent); }
</style>
</head>
<body>

<header>
  <a href="../" class="back-link">← Lista materiałów</a>
  <h1>Matematyka — zaliczenie (funkcje, pochodne, nierówności)</h1>
  <div class="meta-row">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="counter" id="counter">1 / 1</div>
  </div>
</header>

<main>
  <div id="cardArea"></div>

  <div class="controls" id="controlsArea"></div>

  <p class="keyboard-hint">Spacja — pokaż / ukryj odpowiedź &nbsp;·&nbsp; <kbd>&rarr;</kbd> następna &nbsp;·&nbsp; <kbd>&larr;</kbd> poprzednia</p>
</main>

<script>
  const FLASHCARDS_DATA = [
  {
    "category": "Dziedzina funkcji",

    "description": "Wyrażenie pod pierwiastkiem parzystego stopnia (2, 4, 6...) musi być nieujemne, bo z liczby ujemnej nie da się wyciągnąć pierwiastka rzeczywistego. Warunek: g(x) >= 0. Rozwiązujemy tę nierówność i otrzymany zbiór jest dziedziną (ewentualnie po przecięciu z innymi warunkami, jeśli funkcja ma więcej składników)."
  },
  {

  },
  {
    "category": "Dziedzina funkcji",
    "term": "Jaki warunek nakłada na dziedzinę logarytm log_a(g(x))?",
    "description": "Wyrażenie pod logarytmem musi być ściśle dodatnie: g(x) > 0 (logarytm z zera lub liczby ujemnej nie istnieje). Dodatkowo podstawa a musi spełniać a > 0 i a != 1, ale to zwykle dane jest z góry, a nie zależy od x."
  },
  {
    "category": "Dziedzina funkcji",
    "term": "Funkcja ma kilka warunków na dziedzinę naraz (np. pierwiastek w mianowniku). Co wtedy z dziedziną?",
    "description": "Wyznaczamy każdy warunek osobno (np. wyrażenie pod pierwiastkiem >= 0, mianownik != 0), rozwiązujemy każdą nierówność/równanie z osobna, a dziedziną finalną jest część wspólna (przecięcie) wszystkich tych zbiorów."

  {
    "category": "Parzystość/nieparzystość",

    "description": "Funkcja f jest parzysta, gdy jej dziedzina jest symetryczna względem zera i dla każdego x z dziedziny zachodzi f(-x) = f(x). Sprawdzanie: podstawiamy -x za x w całym wzorze, upraszczamy i porównujemy z oryginalnym f(x). Wykres takiej funkcji jest symetryczny względem osi OY."
  },
  {
    "category": "Parzystość/nieparzystość",

    "description": "Funkcja f jest nieparzysta, gdy jej dziedzina jest symetryczna względem zera i dla każdego x zachodzi f(-x) = -f(x). Sprawdzanie: liczymy f(-x) i porównujemy z -f(x) (czyli z przeciwnym znakiem oryginalnej funkcji). Wykres jest symetryczny względem początku układu współrzędnych (punktu (0,0))."
  },
  {
    "category": "Parzystość/nieparzystość",
    "term": "Funkcja może być jednocześnie 'ani parzysta, ani nieparzysta' — co to znaczy i kiedy tak jest?",
    "description": "Tak jest, gdy f(-x) nie równa się ani f(x), ani -f(x) — czyli funkcja nie ma żadnej z tych symetrii. Częsty przypadek: suma składnika parzystego i nieparzystego, np. f(x) = x^2 + x (x^2 jest parzyste, x jest nieparzyste, suma traci symetrię)."
  },
  {
    "category": "Pochodne",
    "term": "Jaka jest pochodna funkcji potęgowej f(x) = x^n?",
    "description": "f'(x) = n*x^(n-1). To podstawowy wzór, z którego korzysta się przy różniczkowaniu wielomianów. Działa też dla wykładników ujemnych i ułamkowych (czyli też dla pierwiastków zapisanych jako potęgi, np. sqrt(x) = x^(1/2))."
  },
  {
    "category": "Pochodne",
    "term": "Jak liczymy pochodną sumy/różnicy funkcji, np. (f(x)+g(x))'?",
    "description": "Pochodna sumy/różnicy to suma/różnica pochodnych: (f+g)' = f' + g', (f-g)' = f' - g'. Liczymy każdy składnik osobno, a stałe przed funkcją (współczynniki) po prostu zostają jako mnożnik."
  },
  {
    "category": "Pochodne",
    "term": "Jaki jest wzór na pochodną iloczynu dwóch funkcji (f(x)*g(x))'?",
    "description": "(f*g)' = f'*g + f*g'. Czyli: pochodna pierwszej razy druga, plus pierwsza razy pochodna drugiej. To jeden z najczęściej mylonych wzorów — nie wolno mnożyć po prostu pochodnych przez siebie."
  },
  {
    "category": "Pochodne",
    "term": "Jaki jest wzór na pochodną ilorazu (f(x)/g(x))'?",
    "description": "(f/g)' = (f'*g - f*g') / g^2, przy założeniu g(x) != 0. Licznik to różnica (pochodna licznika razy mianownik) minus (licznik razy pochodna mianownika), a mianownik to kwadrat oryginalnego mianownika."
  },
  {
    "category": "Pochodne",
    "term": "Jak różniczkuje się funkcję złożoną — jaka jest reguła łańcuchowa?",
    "description": "Dla h(x) = f(g(x)) pochodna wynosi h'(x) = f'(g(x)) * g'(x). Czyli: różniczkujemy funkcję zewnętrzną względem całego wnętrza (traktując wnętrze jak zmienną), a następnie mnożymy przez pochodną funkcji wewnętrznej. Przykład: (sin(3x))' = cos(3x) * 3."
  },
  {
    "category": "Pochodne",
    "term": "Jakie są pochodne podstawowych funkcji trygonometrycznych: sin x, cos x, tg x?",
    "description": "(sin x)' = cos x; (cos x)' = -sin x (uwaga na minus!); (tg x)' = 1/cos^2(x) = 1 + tg^2(x) (przy x != pi/2 + k*pi). Warto zapamiętać też pochodną ctg x = -1/sin^2(x)."
  },
  {
    "category": "Pochodne",
    "term": "Ile wynosi pochodna funkcji stałej f(x) = c oraz pochodna funkcji liniowej f(x) = ax + b?",
    "description": "Pochodna stałej zawsze wynosi 0 (funkcja stała się nie zmienia). Pochodna funkcji liniowej ax + b wynosi a (stały współczynnik kierunkowy — to po prostu nachylenie prostej, niezależne od x)."
  },
  {
    "category": "Funkcja złożona",
    "term": "Czym jest funkcja złożona (f o g)(x) i jak ją obliczyć dla konkretnego x?",
    "description": "Funkcja złożona (f o g)(x) = f(g(x)) oznacza: najpierw obliczamy wartość funkcji wewnętrznej g dla danego x, a wynik podstawiamy jako argument do funkcji zewnętrznej f. Kolejność ma znaczenie — (f o g) zwykle różni się od (g o f)."
  },
  {
    "category": "Funkcja złożona",
    "term": "Jak wyznaczyć dziedzinę funkcji złożonej f(g(x))?",
    "description": "Trzeba spełnić dwa warunki naraz: x musi należeć do dziedziny funkcji wewnętrznej g, a wartość g(x) musi należeć do dziedziny funkcji zewnętrznej f. Dziedziną złożenia jest część wspólna (przecięcie) zbiorów spełniających oba te warunki."
  },
  {
    "category": "Funkcje trygonometryczne",
    "term": "Jaki jest okres podstawowy funkcji sin x i cos x, a jaki tg x?",
    "description": "sin x i cos x mają okres 2*pi (czyli sin(x+2pi) = sin x). Funkcja tg x ma krótszy okres — pi (czyli tg(x+pi) = tg x), bo powtarza się dwa razy szybciej w obrębie pełnego obrotu kąta."
  },
  {
    "category": "Funkcje trygonometryczne",
    "term": "Jaka jest jedynka trygonometryczna i do czego się ją wykorzystuje?",
    "description": "sin^2(x) + cos^2(x) = 1, dla dowolnego x. Wykorzystuje się ją m.in. do upraszczania wyrażeń trygonometrycznych, wyznaczania jednej funkcji na podstawie drugiej (np. cos x, gdy znamy sin x i ćwiartkę kąta) oraz do dowodzenia tożsamości."
  },
  {
    "category": "Funkcje trygonometryczne",
    "term": "Jakie są dziedziny funkcji tg x i ctg x?",
    "description": "tg x nie jest określone tam, gdzie cos x = 0, czyli dziedzina to R bez punktów pi/2 + k*pi (k całkowite). ctg x nie jest określone tam, gdzie sin x = 0, czyli dziedzina to R bez punktów k*pi. W obu przypadkach wykluczamy punkty, w których odpowiedni mianownik (cos lub sin) się zeruje."
  },
  {
    "category": "Funkcje odwrotne",
    "term": "Kiedy funkcja ma funkcję odwrotną i co to oznacza?",
    "description": "Funkcja musi być różnowartościowa (injektywna) — każdej wartości y odpowiada dokładnie jeden argument x. Wtedy istnieje funkcja odwrotna f^(-1), która 'cofa' działanie f: jeśli f(a) = b, to f^(-1)(b) = a. Wykres f^(-1) jest symetryczny do wykresu f względem prostej y = x."
  },
  {
    "category": "Funkcje odwrotne",
    "term": "Jak praktycznie wyznaczyć wzór funkcji odwrotnej y = f^(-1)(x) na podstawie y = f(x)?",
    "description": "Krok 1: zamieniamy miejscami x i y w równaniu (albo od razu wyznaczamy x z y = f(x)). Krok 2: przekształcamy równanie tak, żeby wyliczyć x w zależności od y. Krok 3: zamieniamy oznaczenia (zapisujemy wynik jako y = ... w zmiennej x), co daje wzór funkcji odwrotnej."
  },
  {
    "category": "Funkcje odwrotne",
    "term": "Jaka jest dziedzina i zbiór wartości funkcji odwrotnej f^(-1) w odniesieniu do f?",
    "description": "Dziedzina funkcji odwrotnej f^(-1) to zbiór wartości oryginalnej funkcji f, a zbiór wartości f^(-1) to dziedzina oryginalnej funkcji f — czyli dziedzina i przeciwdziedzina po prostu zamieniają się miejscami."
  },
  {
    "category": "Funkcje potęgowe",
    "term": "Czym jest funkcja potęgowa i jak zmienia się jej kształt w zależności od wykładnika n (parzyste, nieparzyste, ujemne)?",
    "description": "Funkcja potęgowa to f(x) = x^n (lub ogólniej x do wykładnika rzeczywistego). Dla n parzystego naturalnego wykres jest symetryczny względem OY (funkcja parzysta), przyjmuje tylko wartości nieujemne. Dla n nieparzystego naturalnego wykres jest symetryczny względem początku układu (funkcja nieparzysta), rośnie na całej dziedzinie. Dla n ujemnego pojawia się hiperbola z asymptotami w x=0 i y=0, a dziedzina wyklucza x=0."
  },
  {
    "category": "Funkcje potęgowe",
    "term": "Jaka jest dziedzina funkcji potęgowej f(x) = x^(1/n) (czyli pierwiastka n-tego stopnia zapisanego jako potęga)?",
    "description": "Dla n nieparzystego dziedziną jest cały zbiór liczb rzeczywistych R (pierwiastek nieparzystego stopnia istnieje też z liczb ujemnych). Dla n parzystego dziedziną jest tylko x >= 0 (pierwiastek parzystego stopnia z liczby ujemnej nie istnieje w liczbach rzeczywistych)."
  },
  {
    "category": "Nierówności",
    "term": "Jak rozwiązuje się nierówność kwadratową, np. ax^2 + bx + c > 0?",
    "description": "Wyznaczamy miejsca zerowe trójmianu (deltę i pierwiastki x1, x2, jeśli istnieją), szkicujemy parabolę (ramiona w górę dla a>0, w dół dla a<0) i odczytujemy z wykresu, dla jakich x funkcja jest powyżej (lub poniżej) osi OX, zgodnie ze znakiem nierówności."
  },
  {
    "category": "Nierówności",
    "term": "Co się dzieje ze znakiem nierówności przy mnożeniu/dzieleniu obu stron przez liczbę ujemną?",
    "description": "Znak nierówności trzeba odwrócić (zamienić < na > i odwrotnie, <= na >= i odwrotnie). To jeden z najczęstszych błędów na egzaminach — łatwo o tym zapomnieć przy przenoszeniu wyrazów ze zmianą znaku przy mnożeniu przez ujemny współczynnik."
  },
  {
    "category": "Nierówności",
    "term": "Jak rozwiązać nierówność z ułamkiem algebraicznym, np. h(x)/g(x) > 0?",
    "description": "Sprowadzamy do postaci ilorazu względem zera (jeśli trzeba, przenosimy wszystko na jedną stronę). Wyznaczamy miejsca zerowe licznika i mianownika, zaznaczamy je na osi liczbowej (miejsca zerowe mianownika zawsze jako wykluczone — kółka puste), badamy znak na poszczególnych przedziałach metodą siatki znaków i odczytujemy rozwiązanie zgodnie z nierównością."
  },
  {
    "category": "Układy pozycyjne",
    "term": "Co to jest pozycyjny system liczbowy i co oznacza podstawa systemu (np. 2, 8, 10, 16)?",
    "description": "W systemie pozycyjnym wartość cyfry zależy od jej pozycji w zapisie liczby — każda pozycja odpowiada kolejnej potędze podstawy systemu. Podstawa (np. 2 dla binarnego, 8 dla ósemkowego, 10 dla dziesiętnego, 16 dla szesnastkowego) określa, ile różnych cyfr jest dostępnych na każdej pozycji (np. system dwójkowy używa tylko cyfr 0 i 1)."
  },
  {
    "category": "Układy pozycyjne",
    "term": "Jak zamienić liczbę z systemu dziesiętnego na binarny (np. 23 na system dwójkowy)?",
    "description": "Dzielimy liczbę kolejno przez 2, zapisując za każdym razem resztę (0 lub 1), aż iloraz osiągnie 0. Wynik odczytujemy od ostatniej reszty do pierwszej (od dołu do góry). Przykład dla 23: 23/2=11 r1, 11/2=5 r1, 5/2=2 r1, 2/2=1 r0, 1/2=0 r1, odczytane od dołu daje 10111 w systemie dwójkowym."
  },
  {
    "category": "Układy pozycyjne",
    "term": "Jak zamienić liczbę z systemu binarnego na dziesiętny (np. 1011 w systemie dwójkowym)?",
    "description": "Każdą cyfrę mnożymy przez odpowiednią potęgę 2 (licząc pozycje od prawej, zaczynając od 2^0) i sumujemy wyniki. Dla 1011(2): 1*2^3 + 0*2^2 + 1*2^1 + 1*2^0 = 8 + 0 + 2 + 1 = 11 w systemie dziesiętnym."
  }

  let order = [];
  let pos = 0;
  let revealed = false;

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function resetDeck(doShuffle) {
    order = doShuffle ? shuffle(FLASHCARDS_DATA.map((_, i) => i)) : FLASHCARDS_DATA.map((_, i) => i);
    pos = 0;
    revealed = false;
    render();
  }

  function currentCard() {
    return FLASHCARDS_DATA[order[pos]];
  }

  function render() {
    const card = currentCard();
    const cardArea = document.getElementById('cardArea');
    const controlsArea = document.getElementById('controlsArea');

    cardArea.innerHTML = `
      <div class="card" id="cardEl">
        ${card.category ? `<div class="category">${escapeHtml(card.category)}</div>` : ''}
        <div class="term">${escapeHtml(card.term)}</div>
        <div class="hint ${revealed ? 'hidden-when-revealed' : ''}">Kliknij albo wciśnij spację, żeby sprawdzić odpowiedź</div>
        <div class="description ${revealed ? '' : 'hidden'}">${escapeHtml(card.description)}</div>
      </div>
    `;

    document.getElementById('cardEl').addEventListener('click', toggleReveal);

    controlsArea.innerHTML = `
      <button id="shuffleBtn" class="icon-btn" title="Przetasuj fiszki">🔀 Przetasuj</button>
      <div class="nav-group">
        <button id="prevBtn" ${pos === 0 ? 'disabled' : ''}>← Poprzednia</button>
        <button id="revealBtn" class="primary">${revealed ? 'Ukryj' : 'Pokaż odpowiedź'}</button>
        <button id="nextBtn">${pos === order.length - 1 ? 'Zakończ' : 'Następna →'}</button>
      </div>
    `;

    document.getElementById('shuffleBtn').onclick = () => resetDeck(true);
    document.getElementById('prevBtn').onclick = goPrev;
    document.getElementById('revealBtn').onclick = toggleReveal;
    document.getElementById('nextBtn').onclick = goNext;

    document.getElementById('counter').textContent = `${pos + 1} / ${order.length}`;
    document.getElementById('progressFill').style.width = `${((pos + (revealed ? 1 : 0.3)) / order.length) * 100}%`;
  }

  function toggleReveal() {
    revealed = !revealed;
    render();
  }

  function goNext() {
    if (pos < order.length - 1) {
      pos++;
      revealed = false;
      render();
    } else {
      showDone();
    }
  }

  function goPrev() {
    if (pos > 0) {
      pos--;
      revealed = false;
      render();
    }
  }

  function showDone() {
    document.getElementById('cardArea').innerHTML = `
      <div class="done-screen">
        <h2>To wszystkie fiszki w tej talii 🎉</h2>
        <p>Możesz przejść jeszcze raz w nowej losowej kolejności.</p>
      </div>
    `;
    document.getElementById('controlsArea').innerHTML = `
      <div class="nav-group" style="margin: 0 auto;">
        <button id="restartBtn" class="primary">Zacznij od nowa (nowa kolejność)</button>
      </div>
    `;
    document.getElementById('restartBtn').onclick = () => resetDeck(true);
    document.getElementById('progressFill').style.width = '100%';
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); toggleReveal(); }
    if (e.code === 'ArrowRight') goNext();
    if (e.code === 'ArrowLeft') goPrev();
  });

  resetDeck(true);
</script>

</body>
</html>
