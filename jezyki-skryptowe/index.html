unkcja open() otwiera plik i wiąże go z uchwytem (filehandle), np. open($file, \"<in.dat\");. Symbol < oznacza tryb odczytu (domyślny, można pominąć), > oznacza tryb zapisu (jeśli plik istnieje, zostaje nadpisany od zera), a >> oznacza tryb dopisywania na końcu istniejącego pliku. Po zakończeniu pracy plik zamyka się funkcją close($file);.", "category": "Perl – pętle i pliki"}, {"term": "Czytanie z pliku — pojedyncza linia vs wszystkie linie", "description": "Po otwarciu pliku do odczytu, pojedynczą linię wczytuje się przez $linia = <$file>;, a wszystkie linie naraz do tablicy przez @linie = <$file>; (każdy element tablicy to jedna linia pliku wraz ze znakiem końca linii). Przy próbie odczytu poza koniec pliku zwracana jest wartość undef.", "category": "Perl – pętle i pliki"}, {"term": "Pisanie do pliku w Perlu", "description": "Aby pisać do pliku, otwiera się go w trybie zapisu ('>' nadpisuje istniejącą zawartość, '>>' dopisuje na końcu), np. open($file, \">out.dat\");. Zapisu dokonuje się poleceniem print, podając uchwyt pliku bezpośrednio po print, bez przecinka między nimi, np. print $file \"jakieś dane\\n\"; — brak przecinka po uchwycie pliku jest tu istotną pułapką składniową.", "category": "Perl – pętle i pliki"}, {"term": "Operatory testowania plików w Perlu", "description": "Perl udostępnia zestaw jednoznakowych operatorów do sprawdzania atrybutów pliku, np.: -e $plik (czy plik istnieje), -r $plik (czy jest do odczytu), -w $plik (czy mamy prawa zapisu), -d $plik (czy to katalog), -f $plik (czy to zwykły plik), -T $plik (czy to plik tekstowy), -B $plik (czy to plik binarny).", "category": "Perl – pętle i pliki"}, {"term": "Inne operacje na plikach: read, seek, tell, truncate", "description": "read(UCHWYT, $bufor, $liczba_bajtów) odczytuje podaną liczbę bajtów z pliku do bufora. seek(UCHWYT, $pozycja, $tryb) przesuwa wskaźnik odczytu/zapisu na dowolną pozycję w pliku. tell(UCHWYT) zwraca bieżącą pozycję wskaźnika w pliku. truncate(UCHWYT, $rozmiar) obcina plik do podanego rozmiaru.", "category": "Perl – pętle i pliki"}, {"term": "Operator diamentowy <>", "description": "Operator diamentowy <> wczytuje kolejno wszystkie dane ze wszystkich plików podanych jako argumenty wiersza poleceń programu (korzystając z tablicy @ARGV). Jeśli nie podano żadnego pliku jako argumentu, dane wczytywane są zamiast tego ze standardowego wejścia (STDIN) — dzięki temu ten sam skrypt działa zarówno z plikami, jak i w potoku danych.", "category": "Perl – pętle i pliki"}, {"term": "Specjalny uchwyt <DATA> i sekcja __END__", "description": "Uchwyt DATA służy wyłącznie do odczytu danych umieszczonych w samym pliku źródłowym skryptu, po znaczniku __END__. Jest to wygodne przy testowaniu kodu, ponieważ nie trzeba tworzyć zewnętrznych plików danych — testowe dane można umieścić bezpośrednio pod kodem programu.", "category": "Perl – pętle i pliki"}, {"term": "Znak | (potok) jako nazwa pliku w open()", "description": "Jeśli nazwa pliku przekazana do open() zaczyna się od znaku |, jest ona traktowana jako polecenie powłoki (shell) — dane można dostarczyć do tego polecenia przez print. Jeśli natomiast nazwa pliku kończy się znakiem |, wynik działania tego polecenia shellowego można odczytać w skrypcie za pomocą operatora <...>.", "category": "Perl – pętle i pliki"}, {"term": "Przetwarzanie łańcuchów znaków w Perlu — konkatenacja i powtórzenie", "description": "Konkatenację (łączenie) łańcuchów realizuje operator kropki (.), np. $name = $imię . ' ' . $nazwisko;. Powtórzenie łańcucha (lub listy) realizuje operator x, np. $line = '-' x 80; (80 myślników). Istnieją też skrócone zapisy przypisania złożonego: .= (dołącz do końca, $page .= $line; to skrót od $page = $page . $line;) oraz x= (powtórz i przypisz).", "category": "Perl – stringi i funkcje wbudowane"}, {"term": "Funkcje łańcuchowe: length, reverse, lc/uc", "description": "length($łańcuch) zwraca długość łańcucha (liczbę znaków). reverse($łańcuch) zwraca łańcuch odwrócony. lc($łańcuch) zamienia wszystkie znaki na małe litery, a lcfirst($łańcuch) zmienia na małą literę tylko pierwszy znak. uc($łańcuch) zamienia wszystkie znaki na duże litery, a ucfirst($łańcuch) zmienia na dużą literę tylko pierwszy znak.", "category": "Perl – stringi i funkcje wbudowane"}, {"term": "Funkcje index() i substr()", "description": "index($łańcuch, $podłańcuch) zwraca pozycję (indeks) pierwszego wystąpienia podłańcucha wewnątrz łańcucha. substr($łańcuch, $start, $długość) zwraca fragment łańcucha — podanie tylko $start (bez długości) zwraca resztę łańcucha od tej pozycji do końca; substr() może też być użyta po lewej stronie przypisania, by zastąpić dany fragment łańcucha nową wartością.", "category": "Perl – stringi i funkcje wbudowane"}, {"term": "Funkcje chr() i ord()", "description": "chr(liczba) zwraca znak odpowiadający podanemu kodowi (np. ASCII). ord(znak) działa odwrotnie — zwraca liczbowy kod podanego znaku. Są to funkcje wzajemnie odwrotne, przydatne np. przy operacjach na kodach znaków.", "category": "Perl – stringi i funkcje wbudowane"}, {"term": "Sortowanie list w Perlu — sort()", "description": "Listę sortuje się funkcją sort(), np. @lista_posortowana = sort(@lista);. Domyślnie sort() sortuje elementy jako łańcuchy tekstowe (alfabetycznie/leksykograficznie) — jeśli chcemy posortować liczby numerycznie (np. żeby 9 znalazło się przed 10), musimy jawnie podać własną funkcję porównującą, typowo { $a <=> $b } (operator <=> to trójwartościowe porównanie liczbowe) — bez tego \"zaklęcia\" sortowanie liczb da błędne, \"leksykograficzne\" wyniki (np. 10 przed 9).", "category": "Perl – stringi i funkcje wbudowane"}, {"term": "Funkcje numeryczne wbudowane w Perlu", "description": "abs zwraca wartość bezwzględną. cos, sin, tan to standardowe funkcje trygonometryczne. exp zwraca e podniesione do podanej potęgi. log zwraca logarytm naturalny (o podstawie e) — logarytm o innej podstawie, np. dziesiętnej, oblicza się przez podzielenie: log10_z_n = log($n)/log(10). rand zwraca losową wartość. sqrt zwraca pierwiastek kwadratowy.", "category": "Perl – stringi i funkcje wbudowane"}, {"term": "Operacje na tablicach jak na stosie: push, pop, shift, unshift", "description": "push @tablica, $wartość; dodaje element na końcu tablicy (jakby tablica była stosem). pop @tablica zdejmuje i zwraca ostatni element tablicy (też jak ze stosu). shift i unshift działają analogicznie, ale operują na początku tablicy — shift zdejmuje i zwraca pierwszy element, a unshift dodaje nowy element na początek.", "category": "Perl – stringi i funkcje wbudowane"}, {"term": "Funkcje join() i split()", "description": "join($separator, @tablica) łączy elementy tablicy w jeden łańcuch, wstawiając między nimi podany separator, np. join(', ', @array) dla (1..5) da string '1, 2, 3, 4, 5'. split(/wzorzec/, $łańcuch) działa odwrotnie — dzieli łańcuch na tablicę elementów w miejscach pasujących do podanego wzorca (wyrażenia regularnego), np. split(/~/, '1~2~3~4~5') zwróci tablicę (1,2,3,4,5).", "category": "Perl – stringi i funkcje wbudowane"}, {"term": "Funkcje operujące na hashach: delete, exists, keys, values", "description": "delete $hash{klucz} usuwa parę klucz-wartość z hasza. exists $hash{klucz} sprawdza, czy dany klucz w ogóle istnieje w haszu (niezależnie od tego, czy jego wartość jest zdefiniowana), zwracając wartość logiczną. keys %hash zwraca listę wszystkich kluczy hasza. values %hash zwraca listę wszystkich wartości zapisanych w haszu.", "category": "Perl – stringi i funkcje wbudowane"}, {"term": "Funkcje czasu w Perlu: time i localtime()", "description": "time zwraca liczbę sekund, jaka upłynęła od 1 stycznia 1970 (epoch, podobnie jak time.time() w Pythonie). localtime() konwertuje taką wartość na czas lokalny w postaci rozłożonej na składowe (rok, miesiąc, dzień, godzina itd.) albo — w kontekście skalarnym — na czytelny, sformatowany łańcuch tekstowy.", "category": "Perl – stringi i funkcje wbudowane"}, {"term": "Definiowanie funkcji (podprogramów) w Perlu — sub", "description": "Podprogramy (funkcje) w Perlu ułatwiają wielokrotne wykorzystanie tego samego fragmentu kodu. Mają nazwę i zawierają blok kodu; definiuje się je słowem kluczowym sub: sub nazwa_procedury { instrukcje; ... }. Nazwy funkcji mogą się składać z dowolnych znaków alfanumerycznych i podkreślenia, rozróżniana jest wielkość liter, a nazwy procedur nie wchodzą w konflikt z nazwami zmiennych.", "category": "Perl – podprogramy i zasięg"}, {"term": "Sposoby wywoływania podprogramów w Perlu", "description": "Podprogram można wywołać na kilka sposobów: &exterminate; (z prefiksem &), exterminate(); (z nawiasami) lub po prostu exterminate; (bez nawiasów i bez &) — ten ostatni sposób działa tylko wtedy, gdy funkcja została wcześniej odpowiednio \"predeklarowana\", tak by interpreter Perla wiedział, że chodzi o wywołanie funkcji, a nie odwołanie do zmiennej o tej samej nazwie.", "category": "Perl – podprogramy i zasięg"}, {"term": "Tablica @_ i przekazywanie argumentów do podprogramów", "description": "Argumenty przekazane do podprogramu trafiają do predefiniowanej tablicy @_, dostępnej wewnątrz ciała procedury — np. wywołanie funkcja(\"To jest parametr\") umieści ten string jako pierwszy (i jedyny) element @_. Ponieważ @_ jest zwykłą tablicą, może zawierać dowolnie wiele argumentów naraz, po których można iterować (np. foreach (@_) { print \" $_\\n\"; }).", "category": "Perl – podprogramy i zasięg"}, {"term": "Różnica między &funkcja i funkcja() przy wywołaniu", "description": "Istnieje subtelna, ale istotna różnica między wywołaniem przez &funkcja (bez nawiasów) a funkcja() (z pustymi nawiasami): wywołanie &funkcja przekazuje do wywoływanego podprogramu bieżącą zawartość tablicy @_ z kontekstu, z którego nastąpiło wywołanie (czyli \"dziedziczy\" argumenty aktualnie wykonywanej funkcji), podczas gdy funkcja() zawsze wywołuje z pustą (lub jawnie podaną) listą argumentów.", "category": "Perl – podprogramy i zasięg"}, {"term": "Przekazywanie argumentów: przez wartość vs przez referencję w Perlu", "description": "Do podprogramów w Perlu argumenty domyślnie przekazywane są jako aliasy do oryginalnych zmiennych (poprzez tablicę @_), co w praktyce zachowuje się podobnie do przekazania przez referencję znanego ze wskaźników w C — modyfikacja elementu @_ wewnątrz funkcji modyfikuje bezpośrednio zmienną zewnętrzną przekazaną przy wywołaniu. Aby tego uniknąć (i pracować na kopiach wartości), argumenty zwykle od razu kopiuje się do zmiennych lokalnych, np. my ($a, $b) = @_;.", "category": "Perl – podprogramy i zasięg"}, {"term": "Prototypy procedur w Perlu", "description": "Prototypy (dostępne od wersji 5.003) pozwalają podprogramowi zachowywać się podobnie do funkcji wbudowanej — zamiast akceptować wszystkie argumenty jako płaską listę, mogą wymagać ściśle określonej liczby i rodzaju argumentów. Deklaruje się je w nawiasie po nazwie procedury, np. sub nazwa($$) { ... } oczekuje dokładnie dwóch skalarów ($ = skalar, @ = tablica jako symbol prototypu).", "category": "Perl – podprogramy i zasięg"}, {"term": "Zwracanie wyniku z podprogramu — return", "description": "Wynik z podprogramu przekazuje się jawnie instrukcją return wartość;. Jeśli return nie zostanie użyte, funkcja zwróci wartość ostatniego ewaluowanego wyrażenia w bloku — co bywa nieoczywiste, zwłaszcza w pętlach, gdzie ostatnią ewaluowaną wartością może być warunek pętli albo nawet undef. Dobrym zwyczajem jest zawsze jawnie korzystać z return, by uniknąć niejednoznaczności.", "category": "Perl – podprogramy i zasięg"}, {"term": "Funkcja wantarray — kontekst wywołania", "description": "Czasami chcemy, by ten sam podprogram zwracał raz skalar, a raz listę/tablicę, w zależności od tego, w jakim kontekście został wywołany. Funkcja wantarray pozwala to sprawdzić wewnątrz podprogramu — zwraca prawdę (true), jeśli wywołanie nastąpiło w kontekście listowym (tablicowym), a fałsz (false), jeśli w kontekście skalarnym.", "category": "Perl – podprogramy i zasięg"}, {"term": "Moduły w Perlu i CPAN", "description": "Moduł to \"reużywalna porcja kodu\". Sam Perl standardowo jest wyposażony w ponad 100 modułów (pełną listę pokazuje perldoc perlmodlib). Poza tym istnieje ogromne, publicznie dostępne repozytorium darmowych modułów o nazwie CPAN (Comprehensive Perl Archive Network, dostępne pod cpan.org / search.cpan.org), które pozwala wyszukiwać moduły po nazwie, nazwie dystrybucji czy autorze — trzeba pamiętać, że CPAN może zawierać także nowsze wersje modułów wchodzących standardowo w skład samego Perla.", "category": "Perl – podprogramy i zasięg"}, {"term": "Instalacja modułów Perla — \"trudniejsza droga\\\"", "description": "Ręczna instalacja modułu z CPAN wygląda następująco: pobranie archiwum (np. MyModule-X.XX.tar.gz), zdekompresowanie (gunzip), rozpakowanie (tar xvf), wejście do rozpakowanego katalogu, wygenerowanie Makefile (perl Makefile.PL), skompilowanie/zbudowanie modułu (make), przetestowanie wyniku (make test), a na końcu instalacja (make install) — do tego ostatniego kroku zwykle potrzebne są uprawnienia administratora (root), chyba że zainstalujemy moduł do własnej, osobistej biblioteki (perl Makefile.PL PREFIX=~/perl), pamiętając wtedy o odpowiednim dostosowaniu zmiennej @INC.", "category": "Perl – podprogramy i zasięg"}, {"term": "Instalacja modułów Perla — \"łatwiejsza droga\\\" (CPANPLUS)", "description": "CPANPLUS.pm to narzędzie dystrybuowane z nowszymi wersjami Perla, które automatyzuje cały proces instalacji modułów z CPAN, w tym rozwiązywanie zależności między modułami — sam pobiera, buduje, testuje i instaluje moduł. Może wciąż wymagać uprawnień root-a (do czego można wykorzystać np. sudo), a jego działanie może być utrudnione, jeśli sieć jest ograniczona firewallem.", "category": "Perl – podprogramy i zasięg"}, {"term": "Moduły funkcyjne vs moduły obiektowe w Perlu", "description": "Perl rozróżnia dwa główne typy modułów: funkcyjne — eksportują do naszego programu nowe podprogramy (funkcje/procedury) oraz zmienne, oraz obiektowe — zwykle nie eksportują nic w ten sposób, tylko udostępniają klasę do tworzenia obiektów. Rozróżnienie to nie jest jednak sztywne — niektóre moduły (jak CGI.pm) łączą oba podejścia.", "category": "Perl – podprogramy i zasięg"}, {"term": "Importowanie modułów — use", "description": "Moduły funkcyjne importuje się poleceniem use, np. use CGI; lub use strict;. Importowanie modułu zagnieżdżonego w większym pakiecie realizuje się przez podwójny dwukropek, np. use Math::BigInt;. Pliki modułów mają rozszerzenie .pm i nazwę odpowiadającą nazwie modułu; interpreter szuka ich w katalogach wymienionych w tablicy @INC — jeśli moduł znajduje się poza tymi katalogami, można wskazać nowe miejsce pragmą lib.", "category": "Perl – podprogramy i zasięg"}, {"term": "Używanie modułów obiektowych w Perlu", "description": "Typowy schemat korzystania z modułu obiektowego: najpierw use My::Object; (zaimportowanie modułu), potem utworzenie obiektu, np. $obj = new My::Object; (lub $obj = My::Object->new;), a następnie wywoływanie metod obiektu przez strzałkę, np. $obj->set_name($name);.", "category": "Perl – podprogramy i zasięg"}, {"term": "Importowanie symboli — pełna nazwa vs import ręczny", "description": "Operator use daje dostęp tylko do procedur i zmiennych, które moduł jawnie wyeksportował. Do pozostałych można się dostać na dwa sposoby: odwołując się do nich pełną, kwalifikowaną nazwą wraz z nazwą pakietu (np. $a = &NazwaModulu::NazwaFunkcji(par);, gdzie podwójny dwukropek oddziela nazwę modułu od nazwy funkcji), albo importując je ręcznie, np. use modul qw(fun1 fun2 fun3);. Napisanie samego fun1 zaimportuje wszystko o tej nazwie niezależnie od sigilu (czyli $fun1, @fun1 i %fun1 naraz) — żeby zaimportować tylko konkretną zmienną skalarną, trzeba jawnie podać jej sigil, np. use modul qw($zm1);.", "category": "Perl – podprogramy i zasięg"}, {"term": "Rodzaje zmiennych w Perlu: globalne, my, our", "description": "Zmienna globalna deklarowana jest po prostu jako $zmienna (bez słowa kluczowego), a jej zasięg to cały plik/pakiet. Zmienna lokalna (leksykalna) deklarowana jest przez my $zmienna — jej zasięg to blok kodu, w którym została zadeklarowana (najczęściej stosowana, zalecana forma zmiennych). Zmienna \"pakietowa\" deklarowana jest przez our $zmienna — jest związana z konkretnym pakietem/modułem, a nie z blokiem kodu.", "category": "Perl – podprogramy i zasięg"}, {"term": "Pakiety w Perlu (namespace)", "description": "Kod Perla organizowany jest w pakiety — nowy pakiet tworzy się instrukcją package MyPackage;. Najlepiej myśleć o pakiecie jak o przestrzeni nazw (namespace) — pakietów używa się właśnie po to, by zapobiegać konfliktom nazw między różnymi bibliotekami/modułami. Domyślnym pakietem, w którym uruchamiany jest kod, jeśli nie zadeklarujemy inaczej, jest pakiet o nazwie \"main\".", "category": "Perl – podprogramy i zasięg"}, {"term": "Zmienne pakietowe i ich pełna kwalifikacja", "description": "Zmienne pakietowe egzystują w tzw. tablicy symboli danego pakietu. Można się do nich odwołać, używając w pełni kwalifikowanej nazwy, łącząc nazwę pakietu ze zmienną podwójnym dwukropkiem, np. $main::zmienna czy @pakiet::tablica. Wewnątrz samego pakietu, do którego zmienna należy, nazwa pakietu nie jest wymagana — można odwołać się bezpośrednio przez samą nazwę zmiennej.", "category": "Perl – podprogramy i zasięg"}, {"term": "Deklarowanie zmiennych pakietowych — our i use vars", "description": "Zmienną pakietową można jawnie predeklarować za pomocą our, np. our ($doktor, @liczby, %miejsce_urodzenia);. W starszych wersjach Perla (przed our) stosowano do tego dyrektywę use vars, np. use vars qw($doctor @liczby %miejsce_urodzenia);.", "category": "Perl – podprogramy i zasięg"}, {"term": "Słowo kluczowe local w Perlu", "description": "Mimo mylącej nazwy, local nie tworzy nowej zmiennej lokalnej — tworzy tymczasową, lokalną (dynamiczną) kopię istniejącej zmiennej pakietowej, której wartość automatycznie wraca do poprzedniej po opuszczeniu otaczającego bloku. Bywa użyteczne w niewielkiej liczbie przypadków, np. przy chwilowej zmianie wbudowanej zmiennej pakietowej $/ (separator rekordów przy czytaniu z pliku) tylko na czas działania konkretnego bloku kodu, bez wpływania na resztę programu.", "category": "Perl – podprogramy i zasięg"}, {"term": "Referencje w Perlu — koncepcja", "description": "Referencja w Perlu jest bytem zbliżonym do wskaźników znanych z C czy Pascala (ale uznawanym za \"lepszy\" — bardziej bezpieczny i wygodny w użyciu). Referencja stanowi unikalny sposób odwołania się do konkretnej zmiennej (skalara, tablicy lub hasza) niebezpośrednio przez jej nazwę, lecz przez wskazanie na nią.", "category": "Perl – referencje"}, {"term": "Tworzenie referencji do istniejących zmiennych", "description": "Referencję do istniejącej zmiennej tworzy się, umieszczając przed jej nazwą znak ukośnika wstecznego (\\): $scalar_ref = \\$scalar; dla skalara, $array_ref = \\@array; dla całej tablicy, $hash_ref = \\%hash; dla całego hasza. Wynikowa referencja jest zawsze skalarem (stąd sigil $ przy nazwie zmiennej referencji), niezależnie od tego, do jakiego typu wskazuje — dzięki temu referencję można traktować jak każdy inny skalar: przypisywać innym zmiennym, przechowywać w tablicy ($refs[0] = $array_ref;) itd.", "category": "Perl – referencje"}, {"term": "Referencje anonimowe — [ LIST ] i { LIST }", "description": "Nawiasy kwadratowe wokół listy, [ LIST ], tworzą tzw. anonimową tablicę (nieprzypisaną do żadnej nazwanej zmiennej) i od razu zwracają do niej referencję, np. $aref = ['this','is','a','list'];. Nawiasy klamrowe wokół listy, { LIST }, analogicznie tworzą anonimowy hash i zwracają referencję do niego, np. $href = {1 => 'one', 2 => 'two'};. Zapis $aref2 = [@array]; tworzy nową, niezależną kopię tablicy @array (w przeciwieństwie do \\@array, które referuje bezpośrednio do oryginału).", "category": "Perl – referencje"}, {"term": "Dereferencja skalara, tablicy i hasza — stary zapis", "description": "Żeby odzyskać wartość spod referencji, \"opakowuje\" się ją odpowiednim sigilem i klamrą. Dla referencji do tablicy $aref: cała tablica to @{$aref}, pojedynczy element to ${$aref}[0]. Dla referencji do hasza $href: cały hash to %{$href}, pojedynczy element to ${$href}{klucz}. Ten sam zapis działa też po lewej stronie przypisania, np. ${$aref}[0] = 'foo'; podmienia pierwszy element tablicy, na którą wskazuje referencja.", "category": "Perl – referencje"}, {"term": "Operator strzałki -> do dereferencji", "description": "Wygodniejszym, dziś powszechnie stosowanym zapisem dereferencji jest operator strzałki ->, który pozwala uzyskać dostęp do elementu tablicy lub hasza, na jaki wskazuje referencja. Zamiast ${$aref}[0] można napisać $aref->[0], a zamiast ${$href}{key} można napisać $href->{key} — składnia ta jest znacznie bardziej czytelna, zwłaszcza przy zagnieżdżonych strukturach danych (referencje do referencji).", "category": "Perl – referencje"}, {"term": "Po co używać referencji w Perlu", "description": "Referencji używa się przede wszystkim z dwóch powodów: aby efektywnie i świadomie przekazywać parametry do podprogramów (w tym umożliwić funkcji modyfikację oryginalnej struktury danych albo, przeciwnie, uniknąć niechcianej modyfikacji), oraz by budować złożone, zagnieżdżone struktury danych (np. tablicę tablic, hash haszy), które w Perlu bez referencji nie byłyby możliwe do zbudowania wprost.", "category": "Perl – referencje"}, {"term": "Problem przekazywania kilku tablic jako argumentów do podprogramu", "description": "Jeśli do podprogramu spróbujemy przekazać wprost dwie osobne tablice, np. funkcja(@tablica1, @tablica2);, to wewnątrz funkcji próba ich rozdzielenia zapisem my (@a1, @a2) = @_; nie zadziała zgodnie z intencją — Perl automatycznie \"spłaszcza\" (łączy) wszystkie przekazane tablice w jedną, płaską listę wewnątrz @_, więc wszystkie elementy trafią do @a1, a @a2 pozostanie puste. Rozwiązaniem tego problemu jest przekazanie do funkcji referencji do tablic (np. funkcja(\\@tablica1, \\@tablica2);) zamiast samych tablic — referencje (będące pojedynczymi skalarami) nie ulegają spłaszczeniu.", "category": "Perl – referencje"}];

  let order = [];
  let pos = 0;
  let revealed = false;

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function resetDeck(doShuffle) {
    order = doShuffle ? shuffle(FLASHCARDS_DATA.map((_, i) => i)) : FLASHCARDS_DATA.map((_, i) => i);
    pos = 0;
    revealed = false;
    render();
  }

  function currentCard() {
    return FLASHCARDS_DATA[order[pos]];
  }

  function render() {
    const card = currentCard();
    const cardArea = document.getElementById('cardArea');
    const controlsArea = document.getElementById('controlsArea');

    cardArea.innerHTML = `
      <div class="card" id="cardEl">
        ${card.category ? `<div class="category">${escapeHtml(card.category)}</div>` : ''}
        <div class="term">${escapeHtml(card.term)}</div>
        <div class="hint ${revealed ? 'hidden-when-revealed' : ''}">Kliknij albo wciśnij spację, żeby sprawdzić odpowiedź</div>
        <div class="description ${revealed ? '' : 'hidden'}">${escapeHtml(card.description)}</div>
      </div>
    `;

    document.getElementById('cardEl').addEventListener('click', toggleReveal);

    controlsArea.innerHTML = `
      <button id="shuffleBtn" class="icon-btn" title="Przetasuj fiszki">🔀 Przetasuj</button>
      <div class="nav-group">
        <button id="prevBtn" ${pos === 0 ? 'disabled' : ''}>← Poprzednia</button>
        <button id="revealBtn" class="primary">${revealed ? 'Ukryj' : 'Pokaż odpowiedź'}</button>
        <button id="nextBtn">${pos === order.length - 1 ? 'Zakończ' : 'Następna →'}</button>
      </div>
    `;

    document.getElementById('shuffleBtn').onclick = () => resetDeck(true);
    document.getElementById('prevBtn').onclick = goPrev;
    document.getElementById('revealBtn').onclick = toggleReveal;
    document.getElementById('nextBtn').onclick = goNext;

    document.getElementById('counter').textContent = `${pos + 1} / ${order.length}`;
    document.getElementById('progressFill').style.width = `${((pos + (revealed ? 1 : 0.3)) / order.length) * 100}%`;
  }

  function toggleReveal() {
    revealed = !revealed;
    render();
  }

  function goNext() {
    if (pos < order.length - 1) {
      pos++;
      revealed = false;
      render();
    } else {
      showDone();
    }
  }

  function goPrev() {
    if (pos > 0) {
      pos--;
      revealed = false;
      render();
    }
  }

  function showDone() {
    document.getElementById('cardArea').innerHTML = `
      <div class="done-screen">
        <h2>To wszystkie fiszki w tej talii 🎉</h2>
        <p>Możesz przejść jeszcze raz w nowej losowej kolejności.</p>
      </div>
    `;
    document.getElementById('controlsArea').innerHTML = `
      <div class="nav-group" style="margin: 0 auto;">
        <button id="restartBtn" class="primary">Zacznij od nowa (nowa kolejność)</button>
      </div>
    `;
    document.getElementById('restartBtn').onclick = () => resetDeck(true);
    document.getElementById('progressFill').style.width = '100%';
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); toggleReveal(); }
    if (e.code === 'ArrowRight') goNext();
    if (e.code === 'ArrowLeft') goPrev();
  });

  resetDeck(true);
</script>
