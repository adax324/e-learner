<style>
  :root {

  * { box-sizing: border-box; }

  body {
    margin: 0;

<script>
  // Claude wstrzykuje tu właściwe dane: tablicę obiektów { term, description, category? }
  const FLASHCARDS_DATA = [{"term": "Co to jest język skryptowy?", "description": "Język skryptowy to język programowania służący do tworzenia skryptów — zwykle prostszych i krótszych programów niż te pisane w językach systemowych. Charakteryzuje się tym, że skrypty są z reguły interpretowane, a nie kompilowane, mają prostą konstrukcję i często brakuje w nich ścisłej kontroli typów (typowanie dynamiczne). Dzięki temu pisanie skryptów jest zwykle szybsze niż pisanie pełnoprawnych aplikacji w językach takich jak C++ czy Java.", "category": "Wstęp – języki skryptowe"}, {"term": "Do czego służą języki skryptowe?", "description": "Języki skryptowe nie są przeznaczone do pisania rozbudowanych, dużych programów — ich główne zastosowania to: automatyzacja powtarzalnych zadań (np. administracyjnych), integracja różnych, często niezależnych oprogramowań ze sobą, oraz rozbudowa funkcjonalności istniejących programów (np. przez pisanie wtyczek czy rozszerzeń).", "category": "Wstęp – języki skryptowe"}, {"term": "Dlaczego warto używać języków skryptowych?", "description": "Głównym argumentem jest oszczędność czasu pracy programisty, administratora czy testera — napisanie skryptu trwa krócej niż napisanie pełnoprawnego programu. Jedna linia kodu w języku skryptowym często odpowiada kilkuset instrukcjom maszynowym, a programy w Pythonie bywają nawet kilkukrotnie krótsze niż ich odpowiedniki w Javie, mimo realizacji tej samej funkcjonalności.", "category": "Wstęp – języki skryptowe"}, {"term": "Typy (kategorie) języków skryptowych", "description": "Języki skryptowe dzielą się na kilka kategorii ze względu na zastosowanie: języki kontroli zadań i powłoki (np. Unix shell, MS-DOS command.com), języki specyficzne dla konkretnej aplikacji (np. MatLab), języki przetwarzania tekstu (np. Unix grep), dynamiczne języki ogólnego przeznaczenia do budowy dowolnych aplikacji (np. Python, Ruby, Perl) oraz języki GUI służące do symulacji działania użytkownika w interfejsie graficznym.", "category": "Wstęp – języki skryptowe"}, {"term": "Wymień przykłady języków skryptowych", "description": "Do popularnych języków skryptowych należą m.in.: Python, PHP, Perl, JavaScript, Ruby, bash/sh, AWK, Lua, Tcl czy VBScript. Lista jest bardzo długa (obejmuje też mniej znane jak REBOL, Rexx, ObjectRexx czy AutoIt), ponieważ niemal każdy większy system operacyjny lub aplikacja doczekała się własnego, wyspecjalizowanego języka skryptowego.", "category": "Wstęp – języki skryptowe"}, {"term": "PHP — najważniejsze cechy", "description": "PHP powstał w połowie lat 90. XX wieku, a jego twórcą pierwszej wersji jest Rasmus Lerdorf. Jest językiem wieloplatformowym (Windows, Linux, BSD), wspiera zarówno programowanie obiektowe, jak i strukturalne, oraz jest językiem dynamicznym ze słabą kontrolą typów. Głównym zastosowaniem PHP jest generowanie stron internetowych, np. na podstawie danych wprowadzonych przez użytkownika do formularza — implementacje PHP działają zwykle jako interpretery uruchamiane po stronie serwera.", "category": "Wstęp – języki skryptowe"}, {"term": "Python — najważniejsze cechy (przegląd wprowadzający)", "description": "Python powstał we wczesnych latach 90. XX wieku jako następca języka ABC, a jego twórcą jest Guido van Rossum. Wspiera kilka paradygmatów programowania (m.in. obiektowy i strukturalny), jest dynamicznym, interpretowanym językiem, a jego filozofia kładzie nacisk na prostotę i czytelność kodu (tzw. The Zen of Python). Pamięć zarządzana jest automatycznie (garbage collection). W użyciu są dwie główne linie języka: Python 2.x i Python 3.x, a najważniejsze implementacje to CPython, IronPython, Jython i PyPy.", "category": "Wstęp – języki skryptowe"}, {"term": "Ruby — najważniejsze cechy", "description": "Ruby został stworzony w 1995 roku przez Japończyka Yukihiro Matsumoto. Popularność poza Japonią zdobył głównie dzięki frameworkowi Ruby on Rails. Implementacje Ruby są interpreterami. Jest to dynamiczny język obiektowy, w którym dosłownie wszystko jest obiektem, ze wsparciem dla programowania funkcyjnego i strukturalnego. Ruby jest wyjątkowo elastyczny — pozwala podmieniać zachowanie obiektów w czasie działania programu, nawet typów wbudowanych — i posiada automatyczne odśmiecanie pamięci.", "category": "Wstęp – języki skryptowe"}, {"term": "Perl — najważniejsze cechy (przegląd wprowadzający)", "description": "Perl powstał w 1987 roku, a jego twórcą jest Larry Wall. Jest wysokopoziomowym językiem interpretowanym, używanym przede wszystkim do przetwarzania plików tekstowych i binarnych, operacji na powłoce systemowej oraz jako język rozszerzeń. Jest wieloplatformowy.", "category": "Wstęp – języki skryptowe"}, {"term": "JavaScript — najważniejsze cechy (przegląd wprowadzający)", "description": "JavaScript to wysokopoziomowy, dynamiczny, interpretowany język programowania. Zawiera wsparcie zarówno dla obiektowego, jak i funkcyjnego stylu programowania i jest wspierany natywnie przez wszystkie najważniejsze przeglądarki internetowe.", "category": "Wstęp – języki skryptowe"}, {"term": "Typ int (liczby całkowite) w Pythonie", "description": "Liczby całkowite w Pythonie mają typ int, np. -148, 0 czy 1234567898765432. Kluczową cechą Pythona jest to, że wielkość liczb całkowitych nie jest ograniczona odgórnie (w przeciwieństwie np. do typu int w C czy Javie) — Python automatycznie stosuje reprezentację o dowolnej precyzji.", "category": "Python – typy i operatory"}, {"term": "Typ str (ciąg tekstowy) w Pythonie", "description": "Ciąg tekstowy ma typ str i może być ograniczony pojedynczym (') lub podwójnym (\") cudzysłowem. Python używa kodowania Unicode, dzięki czemu nie ma ograniczenia do znaków ASCII. Dostęp do konkretnego znaku uzyskujemy przez indeksowanie w nawiasach kwadratowych, np. s[0] — przy czym indeksowanie zaczyna się od 0.", "category": "Python – typy i operatory"}, {"term": "Niemodyfikowalność (immutability) typów w Pythonie", "description": "Niektóre typy w Pythonie (np. str) są niemodyfikowalne — raz nadana wartość nie może zostać zmieniona. W praktyce oznacza to, że przez indeksowanie w stringu możemy jedynie odczytać dany znak, ale nie możemy go bezpośrednio nadpisać (np. s[0] = 'x' zgłosi błąd) — żeby \"zmienić\" string, trzeba utworzyć nowy obiekt.", "category": "Python – typy i operatory"}, {"term": "Konwersja tekstu na liczbę i liczby na tekst", "description": "Do konwersji ciągu tekstowego na liczbę służą funkcje int() oraz float() — obie tolerują białe znaki (spacje) na początku/końcu konwertowanego tekstu. Jeśli tekst nie da się przekonwertować na liczbę, zgłaszany jest wyjątek. Odwrotną konwersję (liczby na tekst) realizuje funkcja str().", "category": "Python – typy i operatory"}, {"term": "Odniesienie do obiektu (referencje w Pythonie)", "description": "W Pythonie zmienna nie jest \"pudełkiem\" z wartością, lecz odniesieniem (referencją) do obiektu w pamięci. Gdy piszemy x = \"12345\", najpierw tworzony jest obiekt, a potem odniesienie x do tego obiektu. Gdy wykonamy y = x, nie kopiujemy danych — tworzone jest kolejne odniesienie wskazujące na ten sam istniejący obiekt.", "category": "Python – typy i operatory"}, {"term": "Dynamiczna kontrola typów w Pythonie", "description": "Ponieważ zmienna jest jedynie odniesieniem do obiektu, ta sama nazwa zmiennej może w różnych momentach wskazywać na obiekty różnych typów — np. x=10 (int), a potem x=\"abcd\" (str) jest w Pythonie całkowicie poprawne. To zjawisko nazywa się dynamiczną kontrolą typów. Typ obiektu, na jaki aktualnie wskazuje dana referencja, można sprawdzić funkcją type().", "category": "Python – typy i operatory"}, {"term": "Krotki (tuple) vs Listy (list) — koncepcja", "description": "Zarówno krotki, jak i listy służą do przechowywania dowolnej liczby elementów danych dowolnego typu. Kluczowa różnica: krotki są niezmienne (immutable) — po utworzeniu nie da się ich zmodyfikować, natomiast listy są zmienne (mutable) — można do nich wstawiać i usuwać elementy w dowolnym momencie.", "category": "Python – typy i operatory"}, {"term": "Tworzenie krotek — szczególne przypadki", "description": "Krotki tworzy się za pomocą przecinków (nawiasy okrągłe są tylko sposobem wyświetlania przez Pythona, nie są konieczne przy tworzeniu). Trzeba uważać na przecinek: krotka jednoelementowa wymaga przecinka na końcu, np. (\"x\",) — bez niego (\"x\") byłoby po prostu stringiem w nawiasie. Krotkę pustą tworzy się jako ().", "category": "Python – typy i operatory"}, {"term": "Dostęp do elementów krotki", "description": "Do elementów krotki mamy dostęp przez indeksy (od 0), a także przez indeksy ujemne, które liczą pozycje od końca (-1 to ostatni element). Metoda index() pozwala wyszukać pozycję pierwszego wystąpienia danego elementu, a operator in sprawdza przynależność elementu do krotki.", "category": "Python – typy i operatory"}, {"term": "Funkcja len()", "description": "Funkcja len() zwraca liczbę elementów sekwencji — dla krotki i listy jest to liczba elementów, a dla stringa liczba znaków. Jest to jedna z podstawowych, uniwersalnych funkcji działających na wszystkich typach sekwencyjnych w Pythonie.", "category": "Python – typy i operatory"}, {"term": "Metody list: append(), insert() oraz podmiana przez []", "description": "append(x) dopisuje element na końcu listy i jest efektywniejsze niż tworzenie nowej listy od podstaw. insert(pozycja, x) wstawia nowy element na wskazaną pozycję, przesuwając pozostałe elementy. Podmianę istniejącego elementu realizuje się przez przypisanie do indeksu, np. lista[i] = nowa_wartość.", "category": "Python – typy i operatory"}, {"term": "Metoda remove() dla list", "description": "remove(wartość) usuwa z listy pierwszy element o podanej wartości. Jeśli w liście występuje kilka takich samych wartości, tylko pierwsze wystąpienie (licząc od początku) zostanie usunięte — kolejne wywołania remove() usuwają odpowiednio drugie, trzecie itd. wystąpienie, jeśli istnieją.", "category": "Python – typy i operatory"}, {"term": "Krotki vs listy — kiedy czego użyć", "description": "Krotki nie posiadają metod takich jak append, remove czy pop. Krotki działają szybciej niż listy, więc przy iteracji po dużych, niezmiennych zbiorach danych warto używać krotek — dodatkowo ich niezmienność zabezpiecza dane przed przypadkową modyfikacją. Krotkę tworzy się zwykle \"na jeden raz\" (z gotowym zestawem danych), podczas gdy do listy elementy dodaje się sukcesywnie w trakcie działania programu.", "category": "Python – typy i operatory"}, {"term": "Operator tożsamości is", "description": "Operator is sprawdza, czy dwie zmienne wskazują na dokładnie ten sam obiekt w pamięci (tożsamość), a nie czy mają tę samą wartość (do tego służy ==). Dwie zmienne mogą przechowywać identyczne dane, ale być różnymi obiektami (is zwróci wtedy False) — operator is jest szybki, bo nie porównuje wartości, tylko identyfikatory obiektów. Często używa się go do sprawdzenia, czy zmienna wskazuje na wbudowany obiekt None.", "category": "Python – typy i operatory"}, {"term": "Operatory arytmetyczne w Pythonie", "description": "Podstawowe operatory arytmetyczne to +, -, *, / (dzielenie zwracające float). Istnieją też operatory rozszerzone (przypisania złożonego), np. += (dodaj i przypisz) czy *= (pomnóż i przypisz), które modyfikują zmienną \"w miejscu\" skrótową składnią.", "category": "Python – typy i operatory"}, {"term": "Operatory porównania w Pythonie", "description": "Python obsługuje standardowe operatory porównania: == (równy), != (różny), <, <=, >, >=. Ciekawą cechą Pythona jest możliwość łączenia (chainingu) operatorów porównania, np. 1 < x < 10 sprawdza jednocześnie oba warunki. Jeśli porównywane typy nie mają sensu do porównania, zgłaszany jest wyjątek.", "category": "Python – typy i operatory"}, {"term": "Operator przynależności in", "description": "Operator in sprawdza przynależność elementu do sekwencji — działa zarówno na ciągach tekstowych (czy podłańcuch występuje w łańcuchu), jak i na listach oraz krotkach (czy dany element znajduje się w kolekcji). Zwraca wartość logiczną True/False.", "category": "Python – typy i operatory"}, {"term": "Operatory logiczne and, or, not", "description": "Python posiada operatory logiczne and, or oraz not. W odróżnieniu od wielu innych języków, operatory and i or nie zawsze zwracają wartość typu bool — zwracają jeden z operandów (zależnie od kontekstu i tego, który z nich zdecydował o wyniku), co pozwala na sprytne konstrukcje w rodzaju x = a or wartość_domyślna.", "category": "Python – typy i operatory"}, {"term": "Instrukcja warunkowa if w Pythonie", "description": "Składnia: if warunek_1: blok_1, potem opcjonalnie elif warunek_2: blok_2 (można powtórzyć wiele razy), na końcu opcjonalne else: blok_else. W porównaniu do C++ Python nie używa nawiasów okrągłych wokół warunku ani klamrowych wokół bloku — zamiast tego po warunku występuje dwukropek (podobnie jak case), a strukturę bloku wyznacza wcięcie (standardowo 4 spacje).", "category": "Python – typy i operatory"}, {"term": "Pętla while w Pythonie", "description": "Składnia: while warunek_logiczny: blok_instrukcji. Pętla while obsługuje instrukcję break (natychmiastowe opuszczenie pętli) oraz continue (pominięcie reszty bieżącej iteracji i przejście do sprawdzenia warunku na początku pętli).", "category": "Python – typy i operatory"}, {"term": "Pętla for...in w Pythonie", "description": "Składnia: for zmienna in iterowalny_obiekt: blok_instrukcji. Pętla for w Pythonie iteruje bezpośrednio po elementach dowolnego obiektu iterowalnego (np. listy, krotki, stringa, zakresu range()), a nie po licznikach jak klasyczne for w C. Podobnie jak while, obsługuje break i continue. Aby uzyskać klasyczną pętlę licznikową jak w C, trzeba użyć range() — trzeba przy tym uważać na zakres (range jest niewłączający dla górnej granicy).", "category": "Python – typy i operatory"}, {"term": "Obsługa wyjątków try/except w Pythonie", "description": "Składnia: try: blok_try, po którym następuje jeden lub więcej bloków except wyjątek as zmienna: blok. Parametr \"as zmienna\" jest opcjonalny — pomijamy go, gdy nie interesuje nas treść komunikatu błędu. Jeśli blok try wykona się bez błędów, wszystkie bloki except zostają pominięte. Jeśli wystąpi wyjątek, Python szuka pierwszego pasującego bloku except (w kolejności ich występowania) i wykonuje tylko jego.", "category": "Python – typy i operatory"}, {"term": "Identyfikatory w Pythonie — zasady nazewnictwa", "description": "Identyfikator musi być niepustym ciągiem znaków rozpoczynającym się od litery lub znaku podkreślenia (znak początkowy), a kolejne znaki mogą być literami, cyframi lub znakami narodowymi (znak kontynuacji). Wielkość liter jest rozróżniana (case-sensitive), a identyfikator nie może mieć takiej samej nazwy jak słowo kluczowe Pythona. Dobrą praktyką jest unikanie nazw zaczynających i kończących się dwoma znakami podkreślenia (__nazwa__), ponieważ są one zarezerwowane dla metod i zmiennych specjalnych.", "category": "Python – struktury danych i funkcje"}, {"term": "Deklaracja zmiennych w Pythonie i funkcja dir()", "description": "W Pythonie nie deklaruje się zmiennych jawnie tak jak w C czy Javie — zmienna powstaje w momencie, gdy po raz pierwszy nadamy jej wartość (przypisanie). Funkcja dir() pozwala wylistować dostępne w danym momencie nazwy (identyfikatory) w bieżącej przestrzeni nazw.", "category": "Python – struktury danych i funkcje"}, {"term": "Typ bool w Pythonie", "description": "Typ bool przyjmuje jedną z dwóch wartości: True lub False, które w kontekście liczbowym zachowują się odpowiednio jak 1 i 0 (bool jest technicznie podtypem int).", "category": "Python – struktury danych i funkcje"}, {"term": "Zapis liczb całkowitych w różnych systemach liczbowych", "description": "Python pozwala zapisywać liczby całkowite w kilku systemach: dziesiętnym (domyślnie), binarnym z prefiksem 0b, ósemkowym z prefiksem 0o oraz szesnastkowym z prefiksem 0x.", "category": "Python – struktury danych i funkcje"}, {"term": "Operatory bitowe w Pythonie", "description": "Python udostępnia operatory bitowe działające na reprezentacji binarnej liczb całkowitych: | (OR), ^ (XOR), & (AND), << (przesunięcie w lewo), >> (przesunięcie w prawo) oraz ~ (negacja bitowa). Istnieją też ich wersje złożone z przypisaniem: |=, ^=, &=, <<=, >>=.", "category": "Python – struktury danych i funkcje"}, {"term": "Typ float w Pythonie", "description": "float to typ zmiennoprzecinkowy o podwójnej precyzji; jego dokładny zakres zależy od kompilatora (C, C# lub Java) użytego do zbudowania danej implementacji Pythona. Zapisuje się go z kropką dziesiętną (np. 2.7, -3.85) lub w notacji wykładniczej (np. 8.9e-4). Ze względu na sposób reprezentacji liczb zmiennoprzecinkowych trzeba uważać na dokładność porównań (np. 0.1 + 0.2 == 0.3 może dać False).", "category": "Python – struktury danych i funkcje"}, {"term": "Liczby zespolone (complex) w Pythonie", "description": "Typ complex reprezentowany jest jako para liczb typu float (część rzeczywista i urojona). Na liczbach zespolonych nie działają operatory dzielenia całkowitego (//) ani reszty z dzielenia (%), a standardowe funkcje z modułu math również nie obsługują complex — do tego celu służy dedykowany moduł cmath.", "category": "Python – struktury danych i funkcje"}, {"term": "Typ decimal w Pythonie", "description": "decimal pozwala na dokładność ustaloną przez programistę (domyślnie 28 miejsc po przecinku), kosztem wolniejszych obliczeń niż na float. Tworzy się go funkcją decimal.Decimal(), której parametrem może być tekst lub liczba całkowita, ale nie float bezpośrednio. Od wersji 3.1 konwersję z float na decimal umożliwia decimal.Decimal.from_float().", "category": "Python – struktury danych i funkcje"}, {"term": "Porównywanie ciągów tekstowych i normalizacja Unicode", "description": "Na stringach działają wszystkie operatory porównania (<, <=, ==, !=, >=, >), porównujące je leksykograficznie. Problemem jest to, że niektóre znaki Unicode mogą być reprezentowane na kilka różnych sposobów (np. znak z akcentem jako jeden kodpoint albo jako litera plus kombinujący akcent) — dwa wizualnie identyczne stringi mogą się wtedy różnić bajtowo. Pomaga w tym funkcja unicodedata.normalize(), która sprowadza tekst do jednej, kanonicznej reprezentacji przed porównaniem.", "category": "Python – struktury danych i funkcje"}, {"term": "Segmentowanie (slicing) w Pythonie", "description": "Segmentowanie pozwala wyciąć fragment sekwencji (stringa, listy, krotki) za pomocą składni sekwencja[początek:koniec:krok]. Można pominąć dowolny z parametrów — brak początku oznacza start od 0, brak końca oznacza do samego końca sekwencji, a domyślny krok to 1. Ujemny krok pozwala iterować sekwencję wstecz.", "category": "Python – struktury danych i funkcje"}, {"term": "Jak odwrócić ciąg tekstowy w Pythonie", "description": "Najprostszym sposobem na odwrócenie stringa jest segmentowanie z ujemnym krokiem: s[::-1] (pusty początek i koniec oznaczają cały string, krok -1 oznacza iterację od końca do początku). Ten sam efekt można też uzyskać, łącząc funkcję reversed() z metodą str.join(), np. ''.join(reversed(s)).", "category": "Python – struktury danych i funkcje"}, {"term": "Łączenie ciągów tekstowych — + vs str.join()", "description": "Operator + do łączenia stringów jest wolny w działaniu, ponieważ przy każdym użyciu tworzy nowy obiekt string (stringi są niemodyfikowalne). Dużo efektywniejsze, zwłaszcza przy łączeniu wielu fragmentów, jest użycie metody str.join(), np. \"-\".join(lista_stringów), która łączy wszystkie elementy listy separatorem podanym przed kropką.", "category": "Python – struktury danych i funkcje"}, {"term": "Formatowanie ciągów tekstowych w Pythonie", "description": "Python umożliwia formatowanie tekstu za pomocą pól zastępczych (placeholderów) w metodzie str.format(), np. \"{} ma {} lat\".format(imię, wiek). Pola zastępcze pozwalają łączyć w jednym tekście różne typy danych (liczby, stringi) bez ręcznej konwersji, a dodatkowo polom można nadawać nazwy zamiast kolejnych numerów, co poprawia czytelność przy większej liczbie podstawień.", "category": "Python – struktury danych i funkcje"}, {"term": "Funkcje w Pythonie jako obiekty pierwszej klasy", "description": "Definicja funkcji (słowo kluczowe def) tworzy w Pythonie obiekt funkcji, a nazwa funkcji jest po prostu odniesieniem (referencją) do tego obiektu — podobnie jak zmienna wskazująca na dowolny inny obiekt. Dzięki temu funkcje mogą być przechowywane w kolekcjach danych (np. w liście czy słowniku) oraz przekazywane jako argumenty do innych funkcji, co jest podstawą programowania funkcyjnego w Pythonie.", "category": "Python – struktury danych i funkcje"}, {"term": "Rodzaje funkcji w Pythonie", "description": "Python rozróżnia kilka rodzajów funkcji: globalne (dostępne w całym module), lokalne (zdefiniowane wewnątrz innej funkcji), metody (powiązane z konkretnym typem danych i wywoływane tylko na obiektach tego typu) oraz funkcje lambda (wyrażenia, które można tworzyć w miejscu ich użycia, bez nadawania im nazwy).", "category": "Python – struktury danych i funkcje"}, {"term": "Funkcja lambda", "description": "lambda udostępnia sposób tworzenia funkcji anonimowych — wyrażeń zwracających wynik bez potrzeby definiowania ich przez def. Składnia: lambda argumenty: wyrażenie, gdzie argumenty są opcjonalną, oddzieloną przecinkami listą parametrów, a wyrażenie może być dowolnym poprawnym wyrażeniem Pythona (ale tylko jednym, nie blokiem instrukcji). Funkcje lambda ułatwiają przekazywanie prostych funkcji jako parametrów — typowe zastosowanie to funkcja kluczowa (key) przy sortowaniu.", "category": "Python – struktury danych i funkcje"}, {"term": "Programowanie funkcjonalne w Pythonie — trzy koncepcje", "description": "Programowanie funkcjonalne polega na łączeniu funkcji, które nie modyfikują swoich argumentów ani nie odwołują się do stanu programu (nie mają efektów ubocznych). Wiążą się z nim trzy podstawowe koncepcje: mapowanie (map), filtrowanie (filter) i redukowanie (reduce).", "category": "Python – struktury danych i funkcje"}, {"term": "Mapowanie, filtrowanie i redukowanie (map / filter / reduce)", "description": "map(funkcja, lista) pobiera funkcję oraz obiekt iterowalny i generuje nowy obiekt/listę, stosując funkcję do każdego elementu z osobna. filter(funkcja, lista) filtruje sekwencję wejściową, zostawiając tylko te elementy, dla których funkcja zwróciła wartość prawdziwą. reduce(funkcja, lista) wykonuje operację opisaną funkcją kolejno na parach elementów listy, redukując ją ostatecznie do pojedynczej wartości (np. sumując wszystkie elementy krok po kroku).", "category": "Python – struktury danych i funkcje"}, {"term": "Metody krotek: count() i index()", "description": "K.count(x) zwraca liczbę wystąpień obiektu x w krotce K. K.index(x) zwraca pozycję (indeks) pierwszego wystąpienia obiektu x w krotce K. To jedne z niewielu metod, jakie w ogóle posiadają krotki, ponieważ są niezmienne.", "category": "Python – struktury danych i funkcje"}, {"term": "Nazwane krotki (named tuples)", "description": "Nazwane krotki zachowują się jak zwykłe krotki (są niezmienne, obsługują indeksowanie), ale dodatkowo pozwalają odwoływać się do poszczególnych elementów po nazwie, a nie tylko po indeksie liczbowym — co znacząco poprawia czytelność kodu przy strukturach danych o ustalonych, nazwanych polach.", "category": "Python – struktury danych i funkcje"}, {"term": "Słownik (dict) w Pythonie — koncepcja", "description": "Słownik to nieuporządkowana kolekcja par klucz-wartość z unikalnym kluczem. Podstawowo słowniki realizują proste relacje \"jeden do jednego\" pomiędzy kluczem a wartością, ale można też budować bardziej złożone struktury z relacjami \"jeden do wielu\" czy \"wiele do wielu\" (przechowując np. listy jako wartości).", "category": "Python – struktury danych i funkcje"}, {"term": "Typ danych set (zbiór) w Pythonie", "description": "set to kolekcja obsługująca operator przynależności (in), funkcję len() oraz iterację, ale — w odróżnieniu od list i krotek — nie jest uporządkowana (elementy nie mają ustalonej kolejności). Zbiory są modyfikowalne i zawierają wyłącznie unikalne elementy (duplikaty są automatycznie eliminowane).", "category": "Python – struktury danych i funkcje"}, {"term": "Tworzenie zbiorów (set) w Pythonie", "description": "Pusty zbiór tworzy się funkcją set() (nie {} — to tworzy pusty słownik!). set(x) konwertuje inny obiekt iterowalny na zbiór, a jeśli x jest już typu set, otrzymujemy jego kopię. Zbiór z konkretnymi elementami można zapisać w nawiasach klamrowych, np. {7, 'zz', 188, (2,3)} — ale w ten sposób nie da się utworzyć zbioru pustego.", "category": "Python – struktury danych i funkcje"}, {"term": "Operacje i zastosowania zbiorów w Pythonie", "description": "Na zbiorach działają metody takie jak add() czy remove(), oraz operatory jak |= (suma) lub &= (przecięcie) — te ostatnie wymagają, by argumentem był również obiekt typu set. Typowe zastosowania zbiorów to szybkie sprawdzanie przynależności elementu, eliminacja powtarzających się danych (np. konwersja listy z duplikatami na set i z powrotem na listę) oraz usuwanie z jednego zbioru elementów należących do innego (operacja różnicy zbiorów).", "category": "Python – struktury danych i funkcje"}, {"term": "Moduły w Pythonie — koncepcja", "description": "Moduł to zbiór funkcji (a szerzej także klas czy zmiennych), pozwalający na wielokrotne wykorzystanie tego samego kodu w różnych programach bez przepisywania go od nowa. Pakiety to z kolei zbiory modułów pogrupowanych ze względu na realizowane funkcje i wzajemne zależności między nimi.", "category": "Python – moduły, klasy, sieć"}, {"term": "Składnia importowania modułów w Pythonie", "description": "Podstawowa forma to import nazwa_modułu (można też zaimportować kilka naraz, oddzielając przecinkami). Druga rodzina składni to: from moduł import obiekt, from moduł import obiekt as nowa_nazwa (import z nadaniem aliasu), from moduł import obiekt1, obiekt2 (kilka konkretnych elementów) oraz from moduł import * (import wszystkiego bezpośrednio do przestrzeni nazw). Nie ma znaczenia, w jakim języku moduł został napisany — wszystkie importuje się i używa w ten sam sposób.", "category": "Python – moduły, klasy, sieć"}, {"term": "Sposoby odwoływania się do zaimportowanych funkcji", "description": "Przy import math odwołujemy się do funkcji przez pełną nazwę modułu: math.sin(x). Przy from math import sin odwołujemy się bezpośrednio przez nazwę funkcji: sin(x). Przy from math import sin as sinus odwołujemy się przez nadaną nową nazwę: sinus(x).", "category": "Python – moduły, klasy, sieć"}, {"term": "Wybrane moduły standardowej biblioteki Pythona", "description": "Biblioteka standardowa Pythona jest dołączona do pakietu dystrybucyjnego i zawiera m.in.: string (obsługa stringów), struct (pakowanie/rozpakowywanie liczb i tekstu do reprezentacji binarnej, przydatne przy współpracy z bibliotekami niskopoziomowymi), difflib (porównywanie sekwencji, np. tekstów, w formacie diff lub HTML), re (wyrażenia regularne), datetime (obsługa daty i godziny), copy (tworzenie kopii obiektów) oraz math i cmath (funkcje matematyczne).", "category": "Python – moduły, klasy, sieć"}, {"term": "Moduły systemowe i sieciowe Pythona", "description": "Do współpracy z systemem operacyjnym służą moduły os (interfejs uniksowy, zmienne systemowe, procesy) oraz sys (dostęp do środowiska interpretera Pythona). Do komunikacji sieciowej służą m.in. urllib2 (dostęp do zasobów przez URL), httplib (interaktywne zapytania HTTP), ftplib (obsługa protokołu FTP) oraz smtplib/smtpd/pop3 (obsługa poczty e-mail).", "category": "Python – moduły, klasy, sieć"}, {"term": "System klas w Pythonie — najważniejsze cechy", "description": "System klas w Pythonie wyrażony jest minimalnym zestawem nowych środków składniowych. Do najważniejszych cech należą: możliwość dziedziczenia po wielu klasach bazowych naraz, możliwość przesłonięcia (nadpisania) przez klasę pochodną metod klasy bazowej, oraz możliwość wywołania z poziomu klasy pochodnej metody klasy bazowej o tej samej nazwie. Obiekty mogą posiadać dowolną liczbę własnych danych.", "category": "Python – moduły, klasy, sieć"}, {"term": "Właściwości klas w Pythonie", "description": "Wszystkie składowe klasy w Pythonie (łącznie z atrybutami) są domyślnie publiczne, a wszystkie funkcje składowe (metody) są wirtualne. Metoda zawsze deklarowana jest z jawnie wymienionym pierwszym argumentem reprezentującym obiekt, na rzecz którego zostanie wywołana — konwencjonalnie nazywanym self. Same klasy też są obiektami, bo w Pythonie wszystkie typy danych są obiektami; typy wbudowane nie mogą być używane jako klasy bazowe klas zdefiniowanych przez użytkownika, a większość wbudowanych operatorów można przeciążyć dla własnych typów klasowych.", "category": "Python – moduły, klasy, sieć"}, {"term": "Składnia definicji klasy w Pythonie", "description": "Najprostsza definicja klasy ma postać: class NazwaKlasy: a następnie ciąg instrukcji tworzących ciało klasy (np. definicje metod). Podobnie jak funkcje, klasy muszą zostać zdefiniowane (wprowadzone), zanim zostaną użyte w kodzie poniżej.", "category": "Python – moduły, klasy, sieć"}, {"term": "Przestrzenie nazw (namespaces) w Pythonie", "description": "Przestrzenie nazw tworzone są w różnych momentach i są aktywne przez różny czas: przestrzeń nazw wbudowanych tworzona jest przy starcie Pythona i nigdy nie jest usuwana; przestrzeń nazw globalnych modułu tworzona jest podczas wczytywania jego definicji i jest aktywna do zakończenia pracy interpretera; przestrzeń nazw lokalnych funkcji tworzona jest przy jej wywołaniu i niszczona po powrocie z funkcji (lub gdy zgłoszono w niej nieobsłużony wyjątek); wywołanie rekurencyjne za każdym razem tworzy nową, oddzielną przestrzeń nazw lokalnych.", "category": "Python – moduły, klasy, sieć"}, {"term": "Zasięg (scope) zmiennych w Pythonie", "description": "Zasięg to obszar programu, w którym dana przestrzeń nazw jest bezpośrednio osiągalna. W każdej chwili istnieją co najmniej trzy zagnieżdżone zasięgi przeszukiwane w kolejności: zasięg wewnętrzny (innermost, najbardziej zagnieżdżony — nazwy lokalne), zasięg środkowy (next-to-last — aktualne nazwy globalne modułu), oraz zasięg zewnętrzny (outermost — nazwy wbudowane).", "category": "Python – moduły, klasy, sieć"}, {"term": "Tworzenie obiektu klasy — co dzieje się \"pod maską\\\"", "description": "Podczas wprowadzania definicji klasy do programu tworzona jest nowa przestrzeń nazw pełniąca rolę zasięgu lokalnego dla wszystkich przypisań wewnątrz tej definicji. Po zakończeniu definicji klasy tworzony jest obiekt klasy, będący swego rodzaju \"opakowaniem\" dla stworzonej przestrzeni nazw. Następnie przywracany jest zasięg pierwotny (sprzed rozpoczęcia definicji klasy), a nowo utworzony obiekt klasy zostaje powiązany z nazwą podaną w nagłówku definicji.", "category": "Python – moduły, klasy, sieć"}, {"term": "Klasa, obiekt, atrybut — terminologia", "description": "Klasa to swego rodzaju opakowanie dla zmiennych i metod. W Pythonie terminy klasa, typ i typ danych używane są zamiennie. Obiekt (egzemplarz, instancja) odnosi się do konkretnego wystąpienia określonej klasy. Obiekty zwykle posiadają atrybuty, które dzielą się na: metody (atrybuty, które można wykonać/wywołać) oraz dane (pozostałe atrybuty, unikalne dla poszczególnych obiektów).", "category": "Python – moduły, klasy, sieć"}, {"term": "Dostęp do zmiennych instancji, klasy i globalnych", "description": "Wewnątrz metody dostępne są bezpośrednio zmienne lokalne zdefiniowane w tej metodzie. Do zmiennej egzemplarza (instancji) trzeba odwołać się przez pełną nazwę z prefiksem nazwy egzemplarza (self.zmienna). Zmienne klasy są dostępne przez podanie pełnej nazwy łącznie z nazwą klasy. Zmienne globalne są dostępne po prostu przez ich nazwę.", "category": "Python – moduły, klasy, sieć"}, {"term": "Atrybuty __class__ i __doc__", "description": "__class__ to wbudowany atrybut obiektu, który zawiera informację o tym, do jakiej klasy dany obiekt należy. __doc__ to wbudowany atrybut przechowujący \"notkę dokumentacyjną\" (docstring) klasy lub funkcji — czyli tekst umieszczony jako pierwsza instrukcja (string) w ciele definicji.", "category": "Python – moduły, klasy, sieć"}, {"term": "Atrybuty klasy vs atrybuty obiektu", "description": "Atrybut klasy jest zdefiniowany bezpośrednio w ciele klasy i jest wspólny dla wszystkich jej instancji — zmiana atrybutu klasy wpływa na wszystkie obiekty, które nie nadpisały go własną wartością. Atrybut obiektu jest przypisywany konkretnej instancji (np. przez self.x = wartość w metodzie) i dotyczy wyłącznie tego jednego obiektu, niezależnie od innych instancji tej samej klasy.", "category": "Python – moduły, klasy, sieć"}, {"term": "Dziedziczenie i polimorfizm w Pythonie", "description": "Wszystkie klasy w Pythonie dziedziczą (bezpośrednio lub pośrednio) po klasie bazowej object. Klasa, po której się dziedziczy, nazywana jest klasą bazową, a dziedzicząca — klasą pochodną (podklasą). Klasa pochodna może przykrywać (nadpisywać) metody i zmienne z klasy bazowej. Polimorfizm w Pythonie oznacza, że w różnych klasach może istnieć metoda o tej samej nazwie, ale innej funkcjonalności — odpowiednia wersja metody zostanie wywołana zależnie od faktycznego typu obiektu.", "category": "Python – moduły, klasy, sieć"}, {"term": "Czego Python nie oferuje w systemie klas", "description": "W porównaniu z niektórymi innymi językami obiektowymi Python nie oferuje przeciążania metod — nie da się w jednej klasie zdefiniować dwóch metod o tej samej nazwie różniących się tylko listą parametrów (kolejna definicja po prostu nadpisuje poprzednią). Python nie ma też mechanizmu gwarantującego 100% prywatność danych w klasie — najbliższym odpowiednikiem jest konwencja nazywania atrybutów z dwoma znakami podkreślenia na początku (__atrybut), co uruchamia tzw. name mangling i utrudnia (ale nie uniemożliwia całkowicie) przypadkową modyfikację z zewnątrz.", "category": "Python – moduły, klasy, sieć"}, {"term": "Tworzenie obiektu (instancji) klasy", "description": "Obiekt (instancję) tworzy się, wywołując klasę tak, jakby była funkcją: nazwa_obiektu = NazwaKlasy(). Aby sprawdzić, czy dany obiekt faktycznie wskazuje na poprawnie powołaną instancję, można np. wypisać jej reprezentację lub sprawdzić atrybut __class__.", "category": "Python – moduły, klasy, sieć"}, {"term": "Moduły daty i czasu w Pythonie", "description": "Do obsługi daty i czasu służą przede wszystkim moduły calendar, datetime i time. Kluczowe typy to datetime.datetime (data + czas), time.time (czas jako liczba sekund) oraz date.date (sama data, bez godziny).", "category": "Python – moduły, klasy, sieć"}, {"term": "Moduł time — najważniejsze funkcje", "description": "time.time() zwraca liczbę sekund, jaka upłynęła od 1 stycznia 1970 (UTC) — tzw. czas Unix (epoch). time.localtime() zwraca aktualny czas lokalny w postaci struktury czasowej. time.ctime() zwraca czas w postaci sformatowanego, czytelnego dla człowieka łańcucha tekstowego. time.sleep(sekundy) usypia (wstrzymuje) proces na podaną liczbę sekund. time.strftime() pozwala sformatować czas według własnego wzorca.", "category": "Python – moduły, klasy, sieć"}, {"term": "Praca w sieci w Pythonie — przegląd modułów", "description": "Pakiety i moduły do pracy sieciowej stanowią sporą część standardowej biblioteki Pythona. Moduł socket obsługuje tworzenie gniazd sieciowych, wyszukiwanie DNS i obsługę adresów IP. Moduł ssl obsługuje szyfrowanie i uwierzytelnianie gniazd. Moduł socketserver ułatwia obsługę serwerów TCP i UDP, a moduł asyncore umożliwia asynchroniczną obsługę klienta i serwera.", "category": "Python – moduły, klasy, sieć"}, {"term": "Python w WWW — WSGI i moduły HTTP", "description": "Python posiada zdefiniowany interfejs WSGI (Web Server Gateway Interface), który zapewnia standardowy interfejs pomiędzy serwerami WWW a aplikacjami sieciowymi napisanymi w Pythonie (pakiet wsgiref). Moduł http.server oferuje prosty serwer HTTP, moduły http.cookies i http.cookiejar zarządzają ciasteczkami, moduły cgi i cgitb obsługują skrypty CGI, a moduł http.client zapewnia dostęp klienta do żądań HTTP. Pakiet urllib upraszcza obsługę żądań HTTP i dostęp do adresów URL (moduły urllib.parse, urllib.request, urllib.response, urllib.error).", "category": "Python – moduły, klasy, sieć"}, {"term": "Funkcja socket() i jej parametry", "description": "Gniazdo tworzy się funkcją socket([family[, type[, proto]]]). Parametr family określa rodzinę protokołów, np. AF_INET dla IPv4 lub AF_INET6 dla IPv6 (numer protokołu zwykle się pomija). Parametr type określa typ gniazda, np. SOCK_STREAM dla gniazd strumieniowych (TCP), SOCK_DGRAM dla gniazd datagramowych (UDP), a także rzadziej używane SOCK_RAW, SOCK_RDM czy SOCK_SEQPACKET.", "category": "Python – moduły, klasy, sieć"}, {"term": "Tworzenie gniazd — serwer vs klient", "description": "Po stronie serwera do komunikacji z klientem należy kolejno: stworzyć gniazdo, przypisać je (bind) do adresu IP i portu, nasłuchiwać nadchodzących połączeń (listen), oczekiwać na klientów i zaakceptować połączenie (accept), a następnie wysyłać i odbierać dane. Po stronie klienta wystarczy: stworzyć gniazdo, połączyć się z serwerem (connect), a następnie wysyłać i odbierać dane.", "category": "Python – moduły, klasy, sieć"}, {"term": "Czym są wyrażenia regularne?", "description": "Wyrażenia regularne (regex) to pewne wzorce, które pozwalają w skrócony sposób zapisać całą kolekcję (zbiór) pasujących ciągów tekstowych. Występują w wielu narzędziach i językach (emacs, vi, perl, python, grep, sed, awk). Definiuje się je przy użyciu specjalnego minijęzyka, zupełnie odrębnego od składni samego Pythona — do jego elementów należą m.in. ciągi znaków, gwiazdka Kleenego, zbiory znaków i ich dopełnienia, kotwice, zakresy, alternatywa oraz grupowanie.", "category": "Python – wyrażenia regularne"}, {"term": "Powody używania wyrażeń regularnych", "description": "Wyrażeń regularnych używa się do: przetwarzania (identyfikacja i wyodrębnianie fragmentów tekstu, doraźna analiza składniowa), wyszukiwania (odnajdywanie ciągów tekstowych mogących mieć wiele form), wyszukiwania i zastępowania (zamiana każdego dopasowanego fragmentu), dzielenia ciągów tekstowych (podział tekstu w miejscach dopasowania wzorca) oraz sprawdzania poprawności (weryfikacja, czy tekst spełnia zadane kryteria, np. format adresu e-mail).", "category": "Python – wyrażenia regularne"}, {"term": "Moduł re — najważniejsze metody", "description": "re.search(wzorzec, str) szuka dopasowania w dowolnym miejscu całego łańcucha. re.match(wzorzec, str) szuka dopasowania tylko na samym początku łańcucha — to główna różnica względem search. re.split(wzorzec, str) dzieli łańcuch na listę stringów w każdym miejscu dopasowania wzorca. re.findall(wzorzec, str) znajduje wszystkie dopasowania w łańcuchu i zwraca je jako listę — w odróżnieniu od search/match, które zwracają tylko jedno, pierwsze dopasowanie. re.finditer(wzorzec, str) zwraca iterator kolejnych obiektów dopasowania. re.sub(wzorzec, zamiennik, str) zwraca kopię łańcucha z podmienionymi wszystkimi dopasowaniami, a re.subn() działa podobnie, ale dodatkowo zwraca liczbę wykonanych podmian.", "category": "Python – wyrażenia regularne"}, {"term": "Obiekt dopasowania (match object) w module re", "description": "Gdy wyrażenie regularne coś dopasuje, zwracany jest tzw. obiekt dopasowania (match object), który udostępnia m.in. metody: group(n) — zwraca dopasowany tekst dla grupy n (group() bez argumentu zwraca całe dopasowanie), groups() — zwraca krotkę ze wszystkimi dopasowaniami grup począwszy od pierwszej, start(n) i end(n) — zwracają odpowiednio indeks początkowy i końcowy dopasowania dla grupy n, a span(n) — zwraca dla grupy n parę (indeks początkowy, indeks końcowy) jako krotkę.", "category": "Python – wyrażenia regularne"}, {"term": "Klasy znaków w wyrażeniach regularnych", "description": "Podstawowe klasy znaków to: . (kropka) — dowolny znak z wyjątkiem znaku nowej linii, \\d — dowolna cyfra, \\D — dowolny znak niebędący cyfrą, \\s — dowolny biały znak, \\S — dowolny znak niebędący białym znakiem, \\w — dowolny znak alfanumeryczny (litera lub cyfra, także podkreślenie), \\W — dowolny znak niealfanumeryczny.", "category": "Python – wyrażenia regularne"}, {"term": "Klasy znaków w nawiasach kwadratowych []", "description": "Nawiasy kwadratowe [] definiują własną klasę znaków, czyli zbiór znaków, z którymi porównywany jest pojedynczy znak w tekście — np. [abc] dopasuje dowolną z liter 'a', 'b' lub 'c' (dokładnie jeden znak spośród podanych).", "category": "Python – wyrażenia regularne"}, {"term": "Kwantyfikator {m,n} w wyrażeniach regularnych", "description": "Kwantyfikator {m,n} określa minimalną i maksymalną liczbę wystąpień poprzedzającego go elementu wzorca. Jeśli w kwantyfikatorze podana jest tylko jedna liczba, oznacza ona jednocześnie minimum i maksimum, np. a{2} to to samo co a{2,2}. Jeśli kwantyfikator nie jest podany jawnie, domyślnie przyjmowana jest wartość 1, np. ee oznacza dokładnie to samo co e{1}e{1}.", "category": "Python – wyrażenia regularne"}, {"term": "Kwantyfikatory zachłanne i niezachłanne (leniwe)", "description": "Domyślnie kwantyfikatory w wyrażeniach regularnych są zachłanne (greedy) — starają się dopasować jak najwięcej znaków tekstu. Dodanie znaku zapytania po kwantyfikatorze (np. *?, +?, ??, {m,n}?) przekształca go w wersję niezachłanną (leniwą), która stara się dopasować jak najmniejszą możliwą ilość tekstu spełniającą wzorzec.", "category": "Python – wyrażenia regularne"}, {"term": "Asercje w wyrażeniach regularnych", "description": "Asercja nie powoduje dopasowania żadnego tekstu — dostarcza jedynie informacji o kontekście, w którym się znajduje, rozwiązując problem dopasowywania tekstu w niepożądanych miejscach. Najważniejsze asercje to: ^ (początek tekstu / linii przy re.MULTILINE), $ (koniec tekstu / linii przy re.MULTILINE), \\A (początek tekstu), \\Z (koniec tekstu), \\b (granica słowa — pusty string na początku lub końcu słowa), \\B (przeciwieństwo \\b — wnętrze słowa).", "category": "Python – wyrażenia regularne"}, {"term": "Lookahead i lookbehind w wyrażeniach regularnych", "description": "(?=e) to pozytywny lookahead — dopasowuje pozycję, jeśli bezpośrednio po niej występuje wyrażenie e (samo e nie zostaje \"skonsumowane\" przez dopasowanie). (?!e) to negatywny lookahead — dopasowuje, jeśli bezpośrednio po niej NIE występuje e. (?<=e) to pozytywny lookbehind — dopasowuje, jeśli bezpośrednio przed nią występuje e. (?<!e) to negatywny lookbehind — dopasowuje, jeśli bezpośrednio przed nią NIE występuje e.", "category": "Python – wyrażenia regularne"}, {"term": "Surowe ciągi znaków (raw strings) w wyrażeniach regularnych", "description": "Surowe ciągi znaków (raw strings, poprzedzone literą r, np. r\"\\w+\") wyłączają specjalne znaczenie ukośnika wstecznego (backslash) w Pythonie. Dzięki temu przy pisaniu wyrażeń regularnych nie trzeba podwajać ukośników (r\"\\ten\" zamiast \"\\\\ten\"). Dobrą praktyką jest zawsze definiować wzorce regex jako surowe łańcuchy, żeby uniknąć pomyłek wynikających z podwójnego (raz przez Pythona, raz przez regex) interpretowania backslasha.", "category": "Python – wyrażenia regularne"}, {"term": "Grupowanie w wyrażeniach regularnych", "description": "Nawiasy w wyrażeniu regularnym pełnią dwie role: wpływają na kolejność dopasowania oraz tworzą tzw. grupę. (...) to zwykła grupa przechwytująca — po dopasowaniu można odwoływać się do jej zawartości przez odwołanie wsteczne \\1, \\2 itd. (?:...) to grupa nieprzechwytująca — grupuje wyrażenie, ale nie pozwala odwoływać się do jej zawartości przez odwołania wsteczne. (?P<name>...) tworzy grupę nazwaną o nazwie name, do której później można się odwołać przez (?P=name).", "category": "Python – wyrażenia regularne"}, {"term": "Odwołania wsteczne i numeracja grup w regex", "description": "Grupy przechwytujące są numerowane od 1, od lewej do prawej, według kolejności występowania lewego nawiasu otwierającego. Cały wzorzec traktowany jest jako grupa zerowa. W łańcuchu zastępującym używanym przez sub() do grupy zerowej i grup nazwanych odwołujemy się przez \\g<0> oraz \\g<name>, a do grup numerowanych — przez \\g<1>, \\g<2> itd. (co jest przydatne, by uniknąć niejednoznaczności, np. między grupą dwudziestą \\20 a grupą drugą z dodanym literałem 0: \\g<2>0).", "category": "Python – wyrażenia regularne"}, {"term": "Opcje modułu re: IGNORECASE, DOTALL, MULTILINE, VERBOSE", "description": "re.IGNORECASE (re.I) sprawia, że wielkość liter nie jest brana pod uwagę przy dopasowaniu. re.DOTALL (re.S) powoduje, że kropka (.) dopasowuje również znak nowej linii (domyślnie tego nie robi). re.MULTILINE (re.M) sprawia, że ^ i $ dopasowują nie tylko początek/koniec całego tekstu, ale też początek/koniec każdej linii w tekście wieloliniowym. re.VERBOSE (re.X) pozwala umieszczać komentarze i białe znaki wewnątrz wzorca dla czytelności — same spacje przestają być wtedy częścią dopasowania.", "category": "Python – wyrażenia regularne"}, {"term": "Modyfikatory wzorca (?i), (?s), (?m), (?x)", "description": "W odróżnieniu od opcji przekazywanych jako parametr funkcji re, modyfikatory są częścią samego wzorca: (?i) odpowiada re.IGNORECASE, (?s) odpowiada re.DOTALL, (?m) odpowiada re.MULTILINE, a (?x) odpowiada re.VERBOSE. Modyfikatory można ze sobą łączyć, np. (?im). W Pythonie modyfikatory umożliwiają wyłącznie włączanie opcji — nie ma odpowiednika \"wyłącznika\" typu (?-i).", "category": "Python – wyrażenia regularne"}, {"term": "Protokoły TCP i UDP — różnice", "description": "TCP (Transmission Control Protocol) to solidny, połączeniowy protokół, wykorzystywany do przesyłania danych, które nie mogą ulec uszkodzeniu ani zaginięciu (np. FTP, WWW). UDP (User Datagram Protocol) to lekki protokół bezpołączeniowy, stosowany tam, gdzie dane powinny dotrzeć szybko, a zagubienie kilku pakietów (datagramów) nie unieruchamia całej transmisji (np. strumieniowanie wideo lub audio).", "category": "Python – wątki i TCP"}, {"term": "Rodziny adresów gniazd: AF_UNIX, AF_INET, AF_INET6", "description": "AF_UNIX to gniazdo uniksowe umożliwiające komunikację dwóm procesom działającym na tej samej maszynie — adresy takich gniazd reprezentowane są jako łańcuchy. AF_INET to gniazdo IPv4 pomiędzy dwoma procesami — reprezentowane jako krotka (host, port), gdzie host to łańcuch (adres IP lub nazwa domenowa), a port to liczba całkowita. AF_INET6 działa podobnie, ale wykorzystuje 128-bitowe adresy IPv6 zamiast 32-bitowych adresów IPv4 — gniazda tego typu reprezentowane są jako krotka (host, port, flowinfo, scopeid).", "category": "Python – wątki i TCP"}, {"term": "Procesy vs wątki — różnice", "description": "Uruchomienie wielu procesów daje zaletę niezależnego działania każdego z nich, ale obsługa współbieżności spada wtedy na system operacyjny, a komunikacja między procesami jest mało wygodna. Wątek (thread) to jednostka wykonawcza w obrębie jednego procesu — kolejny ciąg instrukcji wykonywany w tej samej przestrzeni adresowej co inne wątki tego procesu. Wątki tego samego procesu współdzielą kod i dane, ale mają oddzielne stosy; obsługa synchronizacji dostępu do współdzielonych danych spada wtedy na programistę.", "category": "Python – wątki i TCP"}, {"term": "Do czego służą wątki?", "description": "Wątki służą przede wszystkim do zrównoleglenia wolnych operacji wejścia/wyjścia (np. ściąganie pliku, obsługa interfejsu użytkownika bez blokowania go) oraz do jednoczesnej obsługi wielu operacji naraz, np. w serwerach WWW obsługujących wielu klientów równocześnie.", "category": "Python – wątki i TCP"}, {"term": "Biblioteki wątkowe Pythona: thread i threading", "description": "Moduł thread to niskopoziomowa biblioteka do obsługi wątków, natomiast threading to wysokopoziomowa biblioteka (wprowadzona od wersji 2.4), oferująca wygodniejszy, obiektowy interfejs. Istnieją też ich atrapy (dummy_thread, dummy_threading) oraz moduł multiprocessing do pracy z osobnymi procesami zamiast wątków.", "category": "Python – wątki i TCP"}, {"term": "Moduł threading — tworzenie wątku przez dziedziczenie z Thread", "description": "Typowy sposób tworzenia wątku w module threading to zdefiniowanie własnej klasy dziedziczącej po threading.Thread. Metoda __init__ wywoływana jest przy tworzeniu instancji wątku (przygotowanie danych wątku), a metoda run() zawiera właściwe instrukcje, które mają zostać wykonane w tym wątku po jego uruchomieniu metodą start().", "category": "Python – wątki i TCP"}, {"term": "Metoda join() dla wątków", "description": "Metoda join() wywołana na obiekcie wątku sprawia, że wątek, z którego poziomu ją wywołujemy (np. wątek główny), zaczeka na zakończenie działania danego wątku, zanim przejdzie dalej. Jest to podstawowy sposób na to, by wątek główny poczekał na zakończenie innych, wcześniej uruchomionych wątków, zamiast zakończyć program przedwcześnie.", "category": "Python – wątki i TCP"}, {"term": "Problem współdzielonej zmiennej między wątkami", "description": "Gdy kilka wątków ma dostęp do tej samej zmiennej globalnej i każdy z nich ją modyfikuje (np. inkrementuje licznik), operacja wykonywana przez jeden wątek może zostać przerwana w dowolnym momencie przez inny wątek, co skutkuje błędnymi, nieprzewidywalnymi wartościami końcowymi. Operacja atomowa to taka, która jest niepodzielna — nie może zostać przerwana w trakcie wykonania przez inny wątek.", "category": "Python – wątki i TCP"}, {"term": "Blokady (Lock) w Pythonie", "description": "Blokadę tworzy się, wywołując funkcję Lock(), która zwraca obiekt-blokadę. Metoda acquire() tego obiektu pozwala zsynchronizować dostęp wątków — jej parametr blocking przyjmuje wartość 0, jeśli nie udało się założyć blokady, i 1, jeśli się udało. Metoda release() służy do zwolnienia wcześniej założonej blokady, umożliwiając innym wątkom dostęp do chronionego zasobu.", "category": "Python – wątki i TCP"}, {"term": "Usypianie i budzenie wątków — wait(), notify(), notifyAll()", "description": "Metoda wait() zwalnia posiadaną blokadę i usypia bieżący wątek, dopóki nie zostanie obudzony. Metoda notify() budzi jeden z uśpionych (oczekujących) wątków, a metoda notifyAll() budzi jednocześnie wszystkie uśpione wątki. Mechanizm ten pozwala na koordynację pracy wielu wątków oczekujących na określony warunek (np. dostępność danych w kolejce).", "category": "Python – wątki i TCP"}, {"term": "Struktura Thread Safe", "description": "Struktura Thread Safe (bezpieczna wątkowo) to taka struktura danych, która może być bezpiecznie używana jednocześnie przez wiele wątków bez ryzyka niespójności danych czy błędów wynikających z równoczesnego dostępu — sama zajmuje się wewnętrzną synchronizacją.", "category": "Python – wątki i TCP"}, {"term": "Moduł Queue — wielowątkowa kolejka", "description": "Moduł Queue umożliwia tworzenie obiektu kolejki (konstruktor Queue(rozmiar)), który może bezpiecznie przechowywać określoną liczbę elementów w środowisku wielowątkowym. Metoda get() usuwa i zwraca element z kolejki (gdy kolejka jest pusta, zgłasza wyjątek Empty). Metoda put() dodaje element do kolejki (gdy jest pełna, zgłasza wyjątek Full). qsize() zwraca liczbę elementów w kolejce, empty() zwraca True, gdy kolejka jest pusta, a full() zwraca True, gdy kolejka jest pełna.", "category": "Python – wątki i TCP"}, {"term": "Dostęp do baz danych w Pythonie — przegląd", "description": "Python oferuje dwa główne podejścia do przechowywania danych: dostęp do prostych, uniwersalnych plików DBM (nie wymagają zewnętrznego serwera bazodanowego) oraz pełnoprawne bazy danych SQL (z zewnętrznym serwerem lub w formie plikowej, jak sqlite3).", "category": "Python – bazy danych"}, {"term": "Moduł anydbm i pliki DBM", "description": "Moduł anydbm udostępnia uniwersalny interfejs pozwalający otworzyć bazę danych opartą o pakiety niskiego poziomu zainstalowane w systemie — po zaimportowaniu automatycznie wyszukuje dostępne pakiety (dbm, gdbm, bsdDB), a jeśli żaden nie jest dostępny, korzysta z wbudowanego dumbdbm. Metoda .open() zwraca obiekt bazy danych, który zachowuje się bardzo podobnie do słownika.", "category": "Python – bazy danych"}, {"term": "Operacje CRUD na plikach DBM", "description": "Obiekt bazy DBM traktuje się jak słownik: dodawanie i aktualizacja wpisu to d[klucz] = wartość (klucz i wartość muszą być standardowymi łańcuchami znaków), odczyt listy kluczy to d.keys(), odczyt listy wartości to d.values(), a odczyt konkretnej wartości to d[klucz]. Usuwanie wpisu realizuje polecenie del d[klucz].", "category": "Python – bazy danych"}, {"term": "Serializacja obiektów — moduł pickle", "description": "Serializacja to najprostszy sposób na obejście ograniczenia plików DBM, które potrafią przechowywać wyłącznie łańcuchy tekstowe. Moduły pickle (oraz szybszy cpickle) pozwalają zamienić dowolny, nawet skomplikowany obiekt Pythona na strumień bajtów (zapis danych po serializacji) i odtworzyć go z powrotem (odczyt danych z deserializacją). Wadą samej serializacji jest brak bezpośredniego dostępu do pojedynczych danych bez wcześniejszego pełnego wczytania i deserializacji całego obiektu.", "category": "Python – bazy danych"}, {"term": "Pliki shelve", "description": "Pliki shelve łączą zalety plików DBM i serializacji — potrafią przechowywać skomplikowane obiekty Pythona, a jednocześnie umożliwiają bezpośredni dostęp do przechowywanych danych po kluczu (podobnie jak DBM). Serializacja i deserializacja odbywa się \"w locie\", w tle. Plik tworzy i otwiera się funkcją shelve.open(...), której ostatni parametr określa metodę serializacji. Wpisy dodaje się analogicznie do słownika: d[klucz] = wartość, gdzie klucz musi być zwykłym łańcuchem, a wartość może być dowolnym obiektem Pythona.", "category": "Python – bazy danych"}, {"term": "Moduły do baz danych zewnętrznych (MySQL, Firebird, ODBC)", "description": "Do połączenia z bazą MySQL służy moduł MySQLdb (instalowany pakietem MySQL-python). Do bazy FireBird służy moduł kinterbasdb. Do dowolnej bazy dostępnej w systemie za pomocą uniwersalnego protokołu ODBC służy moduł pyodbc.", "category": "Python – bazy danych"}, {"term": "Python Database API Specification", "description": "Zalecenia Python Database API Specification precyzują ujednolicone zasady tworzenia bibliotek dostępu do baz danych, dzięki czemu sposób komunikacji programu z bazą teoretycznie nie zależy od konkretnego systemu bazodanowego. W praktyce nie wszystkie biblioteki w pełni się do tych zaleceń stosują, więc dostęp do poszczególnych systemów bywa nieco odmienny.", "category": "Python – bazy danych"}, {"term": "Standardowy schemat pracy z Python DB API", "description": "Typowy schemat pracy z bazą zgodną z Python DB API: import nazwa_modułu (wczytanie modułu bazodanowego), połączenie = nazwa_modułu.connect(opcje) (nawiązanie połączenia z serwerem), kursor = połączenie.cursor() (kursor jako obiekt do bezpośredniej komunikacji z bazą), wynik = kursor.execute(zapytanie) (przesłanie zapytania SQL i odebranie obiektu z wynikami).", "category": "Python – bazy danych"}, {"term": "Odczyt wyników zapytania SQL w Pythonie", "description": "wynik.description (lub kursor.description) udostępnia nagłówek tabeli wynikowej z nazwami kolumn. wynik.fetchall() (lub kursor.fetchall()) zwraca zawartość całej tabeli wynikowej naraz. wynik.fetchone() (lub kursor.fetchone()) zwraca kolejny, pojedynczy wiersz tabeli wynikowej — gdy wszystkie wiersze zostały już pobrane, zwraca None.", "category": "Python – bazy danych"}, {"term": "Zatwierdzanie i wycofywanie zmian — commit(), rollback()", "description": "połączenie.commit() ostatecznie zatwierdza w bazie danych zmiany stanu spowodowane żądaniami wysłanymi przez kursory należące do danego połączenia. połączenie.rollback() ostatecznie porzuca (wycofuje) niezatwierdzone jeszcze zmiany stanu bazy. Na koniec pracy należy zamknąć zasoby: kursor.close() zamyka obiekt kursora, a połączenie.close() zamyka samo połączenie z bazą.", "category": "Python – bazy danych"}, {"term": "Moduł sqlite3", "description": "sqlite3 to standardowy moduł Pythona (dołączony do biblioteki standardowej) do pracy z bazą SQLite — nie wymaga osobnego serwera bazodanowego (baza to zwykły plik, lub może istnieć wyłącznie w pamięci) i jest zgodny z zaleceniami Python Database API Specification. Umożliwia realizację podstawowych operacji CRUD: Create, Read, Update, Delete.", "category": "Python – bazy danych"}, {"term": "row_factory w sqlite3", "description": "Ustawienie właściwości .row_factory na obiekcie połączenia umożliwia dostęp do kolumn (pól) zwracanych wierszy nie tylko przez indeksy liczbowe, ale również po nazwie kolumny — co jest bardzo przydatne i zwiększa czytelność kodu podczas odczytu danych z tabeli wynikowej.", "category": "Python – bazy danych"}, {"term": "Wstawianie danych w sqlite3: execute() vs executemany()", "description": "Do wstawiania pojedynczych rekordów służy metoda kursora .execute() (z zapytaniem SQL typu INSERT, gdzie parametry przekazuje się jako krotkę — jeśli krotka jest jednoelementowa, wymaga przecinka na końcu). Do wstawiania wielu rekordów naraz służy metoda .executemany(), której podaje się krotkę krotek z danymi kolejnych wierszy. Atrybut .lastrowid pozwala pobrać identyfikator (id) ostatnio wstawionego rekordu — działa tylko bezpośrednio po pojedynczym insercie przez execute().", "category": "Python – bazy danych"}, {"term": "Moduł os — funkcje systemowe w Pythonie", "description": "Moduł os zawiera funkcje operujące na identyfikatorze użytkownika, jego grupie, identyfikatorze procesu itd. Funkcje operujące na plikach i katalogach to m.in. chdir() (zmiana katalogu), getcwd() (bieżący katalog), mkdir() (nowy katalog), remove() (usunięcie pliku), rename() (zmiana nazwy), rmdir() (usunięcie katalogu). Funkcje do tworzenia procesów potomnych to m.in. execl(), fork(), kill(), nice(), spawn().", "category": "Python – bazy danych"}, {"term": "Funkcje o zmiennej liczbie argumentów (*args)", "description": "Python pozwala definiować funkcje przyjmujące dowolną, niezadeklarowaną z góry liczbę argumentów pozycyjnych, poprzedzając nazwę parametru gwiazdką, np. def funkcja(*args). Wewnątrz funkcji args jest krotką zawierającą wszystkie przekazane argumenty pozycyjne, po której można iterować lub odwoływać się do niej jak do zwykłej krotki.", "category": "Python – funkcje zaawansowane i GUI"}, {"term": "Parametry nazwane (keyword arguments, **kwargs)", "description": "Oprócz argumentów pozycyjnych Python obsługuje argumenty przekazywane po nazwie (keyword arguments), np. funkcja(imię=\"Jan\", wiek=30) — pozwala to na dowolną kolejność podawania argumentów i zwiększa czytelność wywołania. Funkcja może też zbierać dowolną liczbę takich nazwanych argumentów za pomocą podwójnej gwiazdki, np. def funkcja(**kwargs), gdzie wewnątrz funkcji kwargs jest słownikiem par nazwa-wartość.", "category": "Python – funkcje zaawansowane i GUI"}, {"term": "Funkcje częściowe (functools.partial)", "description": "Funkcje częściowe (partial), dostępne po zaimportowaniu z modułu functools, pozwalają stworzyć nową funkcję na bazie istniejącej, z góry \"zamrażając\" (ustalając) wartości jednego lub kilku jej argumentów. Wywołanie tak utworzonej funkcji częściowej wymaga podania już tylko pozostałych, niezamrożonych argumentów — jest to wygodne np. przy wielokrotnym wywoływaniu tej samej funkcji z częściowo stałymi parametrami.", "category": "Python – funkcje zaawansowane i GUI"}, {"term": "Podstawy Tkinter — tworzenie okna i etykiety", "description": "Tkinter to standardowy moduł Pythona do tworzenia graficznego interfejsu użytkownika (GUI), importowany przez import tkinter. Nowe okno tworzy się, tworząc instancję klasy Tk(). Etykietę (widget tekstowy) tworzy się klasą Label, podając jako rodzica okno główne oraz tekst do wyświetlenia — rozmiar etykiety domyślnie dopasowuje się do długości wyświetlanego napisu. Aby okno faktycznie się wyświetliło i oczekiwało na akcje użytkownika, wywołuje się metodę mainloop() na obiekcie okna.", "category": "Python – funkcje zaawansowane i GUI"}, {"term": "Rozmieszczanie komponentów — funkcja pack()", "description": "Metoda pack() służy do rozmieszczania (układania) komponentów graficznych (widgetów) wewnątrz okna lub innego kontenera w Tkinter, automatycznie ustawiając ich pozycję względem siebie na podstawie prostych reguł (np. strona, wypełnienie), bez konieczności podawania dokładnych współrzędnych pikselowych.", "category": "Python – funkcje zaawansowane i GUI"}, {"term": "Obsługa zdarzeń w Tkinter", "description": "Obsługa zdarzeń w Tkinter polega na napisaniu procedury obsługi zdarzenia (funkcji wywoływanej przy zajściu zdarzenia), a następnie dowiązaniu jej do konkretnej kontrolki (widgetu) i typu zdarzenia metodą bind(). Do typowych zdarzeń myszy należą m.in. <Button-1> (lewy klawisz myszy), <Button-2> (środkowy) i <Button-3> (prawy), a do zdarzeń klawiatury np. <Any-KeyPress> (dowolny naciśnięty klawisz). Zamknięcie okna i zwolnienie zasobów kończy tryb nasłuchiwania zdarzeń.", "category": "Python – funkcje zaawansowane i GUI"}, {"term": "Menu i submenu w Tkinter", "description": "Główne menu aplikacji tworzy się jako osobny widget powiązany z oknem głównym. Do menu głównego dodaje się polecenia (komendy) oraz separatory oddzielające grupy poleceń wizualnie, a następnie aktywuje się je w oknie. Submenu (podmenu) tworzy się jako osobny obiekt menu, do którego dodaje się własne komendy i separatory, a następnie wstawia się je do menu głównego pod odpowiednią etykietą (np. \"Plik\").", "category": "Python – funkcje zaawansowane i GUI"}, {"term": "Czym jest Perl?", "description": "Perl (Practical Extraction and Report Language) to prosty w założeniu język do obróbki plików tekstowych i binarnych, pobierania z nich informacji oraz generowania na tej podstawie komunikatów/raportów. Nie wymaga deklarowania typów zmiennych.", "category": "Perl – wstęp i zmienne"}, {"term": "Historia Perla", "description": "Perl powstał w 1986 roku z inicjatywy Larry'ego Walla; wersja perl-1.0 została ogłoszona w 1987, perl-2.0 w 1988, a perl-3.0 w 1989. W 1991 roku ukazał się perl-4.0 wraz z pierwszą edycją klasycznej książki \"Programming Perl\". Kluczowym momentem był rok 1994 i perl-5.0 — pierwsza wersja języka wspierająca programowanie obiektowe. Kolejne wersje to perl 5.8 (2002) i perl 5.8.8 (2006), przy czym równolegle rozwijany był Perl 6, działający na maszynie wirtualnej Parrot.", "category": "Perl – wstęp i zmienne"}, {"term": "Cechy Perla i jego pozycja wśród języków skryptowych", "description": "Perl bywa nazywany językiem zarządzania systemem, bo może zastąpić dotychczasowe skrypty powłoki (shell). Interpretery Perla są bezpłatne i dostępne na wiele systemów operacyjnych. Jest łatwy w użyciu i wydajny, choć uznawany za mniej czytelny od Pythona. Nie jest językiem kompilowanym, ale mimo to bywa szybszy od większości innych języków interpretowanych. Współcześnie jego najważniejszą alternatywą jest Python, a mocno depczącym mu po piętach konkurentem jest Ruby — cała trójka różni się między sobą raczej filozofią niż realną funkcjonalnością. Jak dotąd Perl (pomijając PHP) pozostaje jednym z najpopularniejszych wielozadaniowych języków skryptowych w internecie.", "category": "Perl – wstęp i zmienne"}, {"term": "Budowa skryptu Perl — podstawowe zasady", "description": "Skrypt Perl nie ma jednego ścisłego formatu, ale obowiązuje kilka reguł: każda komenda musi kończyć się średnikiem (;), tekst rozpoczynający się od # traktowany jest jako komentarz do końca linii, bloki kodu ogranicza się nawiasami klamrowymi {} (jak w C), a pierwszą linią programu jest zwykle tzw. shebang, wskazujący ścieżkę do interpretera Perla.", "category": "Perl – wstęp i zmienne"}, {"term": "Opcje uruchamiania interpretera perl", "description": "Skrypt uruchamia się poleceniem perl nazwa_skryptu.pl. Opcja -h wyświetla pomoc dotyczącą parametrów uruchamiania. Opcja -c kompiluje program wyłącznie w celu wykrycia błędów składniowych, bez faktycznego jego wykonania. Opcja -d[:debugger] uruchamia skrypt pod wskazanym debuggerem. Opcja -T (taint mode) blokuje operacje związane z systemem plików/operacyjnym pochodzące z niezaufanych danych wejściowych, zwiększając bezpieczeństwo programów CGI. Opcja -v wyświetla aktualnie używaną wersję interpretera.", "category": "Perl – wstęp i zmienne"}, {"term": "Komentarze w Perlu, w tym blokowe (POD)", "description": "Zwykłe komentarze zaczynają się od znaku # i trwają do końca linii — to dobry zwyczaj w kodzie. Do komentowania (wyłączania) większych fragmentów kodu naraz służy mechanizm dokumentacji POD (Plain Old Documentation): blok rozpoczęty znacznikiem =for comment i zakończony =cut jest przez interpreter traktowany jako dokumentacja/komentarz, a nie kod do wykonania.", "category": "Perl – wstęp i zmienne"}, {"term": "Ostrzeżenia w Perlu — use warnings / perl -w", "description": "Aby włączyć wyświetlanie ostrzeżeń podczas wykonywania skryptu (np. o użyciu niezainicjalizowanej zmiennej), można uruchomić interpreter z opcją -w, albo — co jest bardziej przenośne i zalecane — dodać na początku skryptu linię use warnings;.", "category": "Perl – wstęp i zmienne"}, {"term": "Dokumentacja Perla — perldoc", "description": "Dokumentacja Perla dostępna jest lokalnie poprzez polecenie perldoc, np. perldoc perl (główna strona dokumentacji) czy perldoc perltoc (spis treści całej dokumentacji). Konkretne tematyczne strony dokumentacji obejmują m.in. perldoc perlintro (wprowadzenie), perldoc perldata (typy danych), perldoc perlsyn (składnia), perldoc perlfaq (najczęstsze pytania), perldoc perlstyle (styl kodu) czy perldoc perlcheat (ściągawka).", "category": "Perl – wstęp i zmienne"}, {"term": "Zasady nazewnictwa zmiennych w Perlu", "description": "Nazwa zmiennej musi się składać ze znaków alfanumerycznych i znaku podkreślenia, nie może zaczynać się od cyfry (dla zmiennych użytkownika), a po pierwszej literze może wystąpić dowolny ciąg liter, cyfr i podkreśleń (maksymalna długość nazwy to 255 znaków). Nazwy zmiennych poprzedzone są tzw. sigilami — znakami $, @ lub % — które od razu wskazują typ (kontekst) przechowywanych danych.", "category": "Perl – wstęp i zmienne"}, {"term": "Deklarowanie zmiennych w Perlu — use strict", "description": "Perl, w odróżnieniu od wielu języków, nie wymaga jawnej deklaracji zmiennych przed użyciem. Mimo to warto je deklarować (np. przez my), ponieważ zmniejsza to ryzyko błędów wynikających z literówek w nazwie zmiennej czy nieporozumień co do zasięgu jej ważności. Wymuszenie ścisłej kontroli (obowiązkowego deklarowania zmiennych) osiąga się dyrektywą use strict;.", "category": "Perl – wstęp i zmienne"}, {"term": "Trzy główne typy danych w Perlu: skalary, tablice, hashe", "description": "Perl rozróżnia trzy podstawowe typy zmiennych, odróżniane sigilem na początku nazwy: skalary (zaczynają się od $) — pojedyncza wartość (liczba, string, referencja); tablice (zaczynają się od @) — uporządkowana lista skalarów; tablice asocjacyjne, czyli hashe (zaczynają się od %) — nieuporządkowany zbiór par klucz-wartość.", "category": "Perl – wstęp i zmienne"}, {"term": "Zmienne skalarne w Perlu", "description": "Zmienne skalarne mogą przyjmować wartości całkowite, zmiennoprzecinkowe lub znakowe (tekstowe) — Perl nie rozróżnia tych typów tak sztywno jak np. Python czy C. Nie muszą być jawnie deklarowane i są alokowane dynamicznie. Domyślną wartością nieprzypisanego skalara jest 0 (lub pusty ciąg, zależnie od kontekstu). Zmienne znakowe użyte w kontekście liczbowym są automatycznie interpolowane (konwertowane) do wartości liczbowej.", "category": "Perl – wstęp i zmienne"}, {"term": "Wartość undef i funkcja defined()", "description": "Zmienna skalarna, której nie przypisano jeszcze żadnej wartości, przyjmuje specjalną wartość undef. Aby sprawdzić, czy zmienna posiada już zdefiniowaną wartość (czy nie jest undef), używa się funkcji defined(), np. if (defined($my_var)) { ... }.", "category": "Perl – wstęp i zmienne"}, {"term": "Automatyczna konwersja typów w Perlu", "description": "Perl dokonuje automatycznej konwersji między łańcuchami znaków a liczbami zawsze, gdy jest to potrzebne w danym kontekście (np. przy dodawaniu liczby do napisu). Napis, który w ogóle nie zaczyna się cyfrą, np. \"abcd\", zostanie przy konwersji na liczbę potraktowany jako 0. Napis zaczynający się cyframi, a kończący tekstem, np. \"123xyz\", zostanie przekonwertowany na wartość liczbową swojego cyfrowego prefiksu, czyli 123.", "category": "Perl – wstęp i zmienne"}, {"term": "Łańcuchy znaków — cudzysłów pojedynczy vs podwójny", "description": "W pojedynczych cudzysłowach ('...') zawartość łańcucha nie jest przetwarzana — zmienne i większość sekwencji specjalnych pozostają dosłownym tekstem (np. '$9.95' wyświetli się dosłownie jako $9.95). W podwójnych cudzysłowach (\"...\") zawartość jest przetwarzana — zmienne są interpolowane (podstawiana jest ich wartość), a sekwencje specjalne (jak \\n) działają zgodnie ze swoim znaczeniem. Żeby wypisać znak specjalny dosłownie w podwójnych cudzysłowach, poprzedza się go ukośnikiem wstecznym (\\).", "category": "Perl – wstęp i zmienne"}, {"term": "Znaki sterujące (escape sequences) w Perlu", "description": "Do najważniejszych znaków sterujących w Perlu (działających wewnątrz podwójnych cudzysłowów) należą: \\n (nowy wiersz), \\r (powrót karetki), \\t (tabulacja), \\a (dzwonek/alarm), \\0nn (wartość ósemkowa znaku), \\xnn (wartość szesnastkowa znaku), \\u (kolejny znak wielką literą), \\l (kolejny znak małą literą), \\U (wszystkie następne znaki wielkimi literami).", "category": "Perl – wstęp i zmienne"}, {"term": "Tablice (wektory) w Perlu", "description": "Perl zawiera wektory (tablice/listy) zmiennych, poprzedzane sigilem @. Tablica przechowuje uporządkowaną listę wartości skalarnych, przy czym elementy listy mogą mieć różne typy (liczby, stringi, referencje) jednocześnie.", "category": "Perl – tablice i hasze"}, {"term": "Dostęp do pojedynczego elementu tablicy w Perlu", "description": "Dostęp do pojedynczego elementu tablicy realizuje się przez $nazwa_tablicy[indeks], np. print $vec[0]; — indeksy zaczynają się od zera. Warto zwrócić uwagę na sigil: mimo że tablica jako całość nazywa się z sigilem @ (@vec), przy dostępie do pojedynczego elementu używamy $, ponieważ pojedynczy element tablicy jest zawsze wartością skalarną.", "category": "Perl – tablice i hasze"}, {"term": "Fragmenty tablic (array slices) w Perlu", "description": "Fragment (wycinek) tablicy — dostęp do kilku wybranych elementów naraz — realizuje się z użyciem sigilu @, np. print @vec[0,2,4]; (elementy o podanych indeksach) lub print @vec[1..3]; (zakres indeksów od 1 do 3 włącznie, operator .. tworzy zakres).", "category": "Perl – tablice i hasze"}, {"term": "Przypisywanie wartości do elementów tablicy w Perlu", "description": "Pojedynczy element przypisuje się jak $array[4] = 'coś';. Perl automatycznie rozszerza tablicę, jeśli przypiszemy wartość do indeksu wykraczającego poza obecny rozmiar, np. $array[400] = 'coś innego'; (elementy pomiędzy wypełniane są undef). Fragment tablicy można przypisać naraz: @array[4, 7..9] = ('cztery', 'siedem', 'osiem', 'dziewięć');. Zamianę miejscami dwóch zmiennych realizuje się elegancko np. przez ($x, $y) = ($y, $x);. Zakresy list buduje operator .., np. @l0 = (1..10); lub @abc = (a..z);.", "category": "Perl – tablice i hasze"}, {"term": "Operatory $# i $[ dla tablic w Perlu", "description": "$#nazwa_tablicy zwraca ostatni ważny (istniejący) indeks danej tablicy (czyli liczbę elementów minus jeden) — to odpowiednik długości tablicy pomniejszonej o 1. $[ (rzadko dziś używane) określało numer pierwszego elementu tablicy, domyślnie 0.", "category": "Perl – tablice i hasze"}, {"term": "Tablice asocjacyjne (hashe) w Perlu", "description": "Tablice asocjacyjne, czyli hashe, to odpowiednik słowników z innych języków — poprzedzane są sigilem %. Kluczem w haszu zawsze są wartości znakowe (liczby użyte jako klucz są automatycznie konwertowane na tekst). Do wartości odwołujemy się po kluczu, podobnie jak w słownikach Pythona.", "category": "Perl – tablice i hasze"}, {"term": "Inicjalizacja hasza — lista vs \"fat comma\\\" =>", "description": "Hasz można zainicjalizować za pomocą płaskiej listy naprzemiennych kluczy i wartości, np. %french = ('one','un','two','deux','three','trois');. Czytelniejszą, bardziej intuicyjną formą jest użycie symbolu => (tzw. \"fat comma\", grubego przecinka), który działa identycznie jak zwykły przecinek, ale wizualnie łączy klucz z jego wartością, np. %german = (one => 'ein', two => 'zwei', three => 'drei');.", "category": "Perl – tablice i hasze"}, {"term": "Dostęp do wartości hasza i fragmenty hasza", "description": "Dostęp do pojedynczej wartości hasza realizuje się przez $hash{klucz} (sigil $, bo pojedyncza wartość jest skalarem), np. $three = $french{three};. Fragment hasza (kilka wartości naraz, po kilku kluczach) realizuje się analogicznie do tablic, z użyciem sigilu @, np. @french{'one','two','three'} zwróci listę odpowiadających im wartości.", "category": "Perl – tablice i hasze"}, {"term": "Ograniczenia tablic asocjacyjnych (hashy) w Perlu", "description": "Hashy nie da się bezpośrednio posortować tak jak listy (elementy hasza nie mają ustalonej kolejności, więc trzeba np. najpierw posortować listę kluczy). Nie istnieje odpowiednik wyrażenia $#array dla hashy. Polecenie print %hash nie działa w sposób czytelny — wypisze surową, niezinterpretowaną reprezentację wewnętrzną hasza, a nie parę klucz-wartość.", "category": "Perl – tablice i hasze"}, {"term": "Zmienne specjalne Perla", "description": "Perl obfituje w predefiniowane zmienne specjalne, z których wiele nazwanych jest znakami interpunkcyjnymi. Najważniejsze z nich to: $_ (domyślny, niejawny argument wielu funkcji i struktur, np. w pętli foreach), $1, $2... (kolejne dopasowane podciągi z ostatniego dopasowania wyrażenia regularnego), $. (numer linii w ostatnio czytanym pliku), @ARGV (lista argumentów wywołania skryptu — $ARGV[0] to pierwszy argument, a nie nazwa programu, która kryje się pod $0), %ENV (zmienne środowiskowe systemu).", "category": "Perl – tablice i hasze"}, {"term": "Wybrane operatory Perla: ** . eq x ..", "description": "** to operator potęgowania (wykładniczy). . to operator konkatenacji (łączenia) dwóch łańcuchów znaków. eq to operator porównania równości łańcuchów tekstowych (odpowiednik == dla liczb — Perl rozróżnia porównania liczbowe i tekstowe osobnymi operatorami!). x to operator powtórzenia. .. to operator zakresu, budujący listę kolejnych wartości.", "category": "Perl – tablice i hasze"}, {"term": "Operatory logiczne w Perlu: && || !", "description": "Perl, podobnie jak C, używa operatorów && (iloczyn logiczny, AND), || (suma logiczna, OR) oraz ! (negacja, NOT). Jedyną istotną różnicą względem C jest brak jednolinijkowego, uproszczonego zapisu warunku — pełne konstrukcje warunkowe zapisuje się jawnie za pomocą if.", "category": "Perl – tablice i hasze"}, {"term": "Instrukcja unless w Perlu", "description": "unless to konstrukcja odwrotna do if — wykonuje blok instrukcji wtedy, gdy warunek logiczny jest fałszywy (czyli działa jak if (!warunek) {...}), co bywa czytelniejsze niż zaprzeczanie warunku w klasycznym if.", "category": "Perl – tablice i hasze"}, {"term": "Pętla for w Perlu", "description": "Klasyczna, C-podobna pętla for ma składnię: for (inicjalizacja; warunek_logiczny; modyfikacja) { ciąg_instrukcji }. Działa identycznie jak pętla for w języku C — najpierw wykonywana jest inicjalizacja, potem sprawdzany warunek, a po każdej iteracji wykonywana modyfikacja licznika.", "category": "Perl – pętle i pliki"}, {"term": "Pętla foreach w Perlu", "description": "foreach to wygodna konstrukcja wspomagająca przetwarzanie list — jej składnia to: foreach $zmienna (@lista) { instrukcje wykonywane na każdym elemencie listy }. Zmienna pętli w każdej iteracji przyjmuje kolejny element listy.", "category": "Perl – pętle i pliki"}, {"term": "Pętla while w Perlu", "description": "Pętla while w Perlu sprawdza warunek na początku (przed) każdą iteracją: while (wyrażenie_logiczne) { ciąg_instrukcji }. Dopóki warunek jest prawdziwy, blok instrukcji jest powtarzany.", "category": "Perl – pętle i pliki"}, {"term": "Wprowadzanie danych i drukowanie elementów listy w pętli while", "description": "Typowe zastosowanie pętli while to wczytywanie danych z klawiatury linia po linii (dopóki nie napotkamy końca danych) albo drukowanie/przetwarzanie elementów listy jeden po drugim, często w połączeniu z funkcją shift, która zwraca (i jednocześnie usuwa) pierwszy element z listy — dzięki czemu warunek pętli można naturalnie sprawdzać przy okazji pobierania kolejnego elementu.", "category": "Perl – pętle i pliki"}, {"term": "Pętla do-while w Perlu", "description": "Pętla do-while sprawdza warunek logiczny na końcu, a nie na początku iteracji: do { ciąg_instrukcji } while (wyrażenie_logiczne);. Dzięki temu ciało pętli zostanie wykonane co najmniej raz, nawet jeśli warunek od razu okaże się fałszywy.", "category": "Perl – pętle i pliki"}, {"term": "Predefiniowane deskryptory plików: STDIN, STDOUT, STDERR", "description": "Cała obsługa wejścia/wyjścia w Perlu opiera się na deskryptorach plików (filehandles). Perl udostępnia trzy predefiniowane deskryptory: STDIN (standardowe wejście, np. klawiatura), STDOUT (standardowe wyjście, np. ekran) i STDERR (standardowe wyjście błędów, oddzielny strumień od STDOUT, używany do komunikatów o błędach).", "category": "Perl – pętle i pliki"}, {"term": "Odczyt danych z STDIN", "description": "Najprostszy sposób na wczytanie danych ze standardowego wejścia to $input = <STDIN>;. Wyrażenie <uchwyt> oznacza \"wczytaj dane z podanego uchwytu (np. pliku lub STDIN)\". Domyślnie <STDIN> wczyta jeden wiersz danych razem ze znakiem terminującym (końca linii) — który zwykle usuwa się dodatkowo funkcją chomp.", "category": "Perl – pętle i pliki"}, {"term": "Otwieranie plików — open() i tryby dostępu", "description": "F
