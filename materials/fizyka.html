<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fizyka — egzamin ISTNS 2026L — fiszki do nauki</title>
<style>
  :root {
    --bg: #14171c;
    --surface: #1c2128;
    --surface-2: #242a33;
    --border: #2d333d;
    --text: #e8eaed;
    --text-dim: #8b919a;
    --accent: #5b9dff;
    --accent-dim: #2c4670;
    --good: #4caf7d;
    --font-display: "Source Serif Pro", Georgia, "Times New Roman", serif;
    --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 64px;
  }

  header {
    width: 100%;
    max-width: 640px;
    margin-bottom: 28px;
  }

  h1 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 1.6rem;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }

  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
    gap: 12px;
  }

  .progress-track {
    flex: 1;
    height: 4px;
    background: var(--surface-2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.25s ease;
  }

  .counter {
    font-size: 0.85rem;
    color: var(--text-dim);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }

  main {
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .card {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 32px;
    min-height: 260px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 20px;
    cursor: pointer;
    transition: border-color 0.15s ease;
  }

  .card:hover { border-color: var(--accent-dim); }

  .category {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    font-weight: 600;
  }

  .term {
    font-family: var(--font-display);
    font-size: 1.7rem;
    line-height: 1.3;
    font-weight: 600;
  }

  .hint {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-top: auto;
  }

  .description {
    font-size: 1.02rem;
    line-height: 1.6;
    color: var(--text);
    border-top: 1px solid var(--border);
    padding-top: 20px;
    margin-top: 4px;
    white-space: pre-line;
  }

  .description.hidden { display: none; }
  .hint.hidden-when-revealed { display: none; }

  .controls {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 22px;
    gap: 10px;
  }

  button {
    font-family: var(--font-body);
    font-size: 0.9rem;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease;
  }

  button:hover { background: var(--surface-2); border-color: var(--accent-dim); }
  button:active { transform: translateY(1px); }
  button:disabled { opacity: 0.35; cursor: default; }

  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #0c1116;
    font-weight: 600;
  }
  button.primary:hover { background: #6fa8ff; }

  .icon-btn {
    padding: 10px 14px;
  }

  .nav-group {
    display: flex;
    gap: 8px;
  }

  .keyboard-hint {
    margin-top: 18px;
    font-size: 0.78rem;
    color: var(--text-dim);
    text-align: center;
  }

  .done-screen {
    width: 100%;
    text-align: center;
    padding: 60px 20px;
  }

  .done-screen h2 {
    font-family: var(--font-display);
    font-size: 1.5rem;
    margin-bottom: 8px;
  }

  .done-screen p {
    color: var(--text-dim);
    margin-bottom: 24px;
  }

  kbd {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 0.78rem;
  }
</style>
</head>
<body>

<header>
  <h1>Fizyka — egzamin ISTNS 2026L</h1>
  <div class="meta-row">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="counter" id="counter">1 / 1</div>
  </div>
</header>

<main>
  <div id="cardArea"></div>

  <div class="controls" id="controlsArea"></div>

  <p class="keyboard-hint">Spacja — pokaż / ukryj odpowiedź &nbsp;·&nbsp; <kbd>&rarr;</kbd> następna &nbsp;·&nbsp; <kbd>&larr;</kbd> poprzednia</p>
</main>

<script>
  // Claude wstrzykuje tu właściwe dane: tablicę obiektów { term, description, category? }
  const FLASHCARDS_DATA = [{"term": "4 oddziaływania fundamentalne", "category": "Mechanika", "description": "Cztery podstawowe siły w przyrodzie. Od najsłabszego do najsilniejszego: grawitacyjne (działa na masy, nieskończony zasięg, najsłabsze) < słabe jądrowe (rozpad β, promieniotwórczość) < elektromagnetyczne (działa na ładunki, trzyma atomy razem) < silne jądrowe (skleja protony i neutrony w jądrze, najsilniejsze). Skrót: G < S < E < Si."}, {"term": "Praca, moc, energia — definicje i wzory", "category": "Mechanika", "description": "Praca: W = F·s·cos α [J] — iloczyn siły i przesunięcia. Moc: P = W/t [W] — praca w jednostce czasu. Energia kinetyczna: Ek = ½mv². Energia potencjalna: Ep = mgh. Zasada zachowania energii: energia nie ginie, tylko zamienia się z jednej formy w drugą."}, {"term": "Droga, prędkość, przyspieszenie", "category": "Mechanika", "description": "Prędkość to pochodna drogi po czasie: v = ds/dt. Przyspieszenie to pochodna prędkości po czasie: a = dv/dt. Dla ruchu jednostajnie przyspieszonego: s = v₀·t + ½·a·t². Prędkość: v = v₀ + a·t."}, {"term": "Prawa dynamiki Newtona", "category": "Mechanika", "description": "I prawo (bezwładności): ciało zachowuje stan spoczynku lub ruchu jednostajnego prostoliniowego, jeśli wypadkowa sił = 0. II prawo: F = ma — przyspieszenie jest proporcjonalne do siły wypadkowej. III prawo (akcja-reakcja): każdej sile towarzyszy równa co do wartości i przeciwnie skierowana siła."}, {"term": "Maszyny proste — zależność siła/droga/praca", "category": "Mechanika", "description": "Maszyna prosta nie zmienia ilości wykonanej pracy (W = F·s = const). Pozwala działać mniejszą siłą, ale za cenę dłuższej drogi. Przykłady: dźwignia, równia pochyła, blok, kołowrót. To, co zyskasz na sile, tracisz na drodze."}, {"term": "Równanie Bernoulliego", "category": "Hydrodynamika", "description": "Dla płynu idealnego suma trzech ciśnień wzdłuż linii prądu jest stała: p + ½ρv² + ρgh = const. Człony: p — ciśnienie statyczne, ½ρv² — ciśnienie dynamiczne, ρgh — ciśnienie hydrostatyczne. Gdy prędkość rośnie, ciśnienie statyczne maleje — to wyjaśnia siłę nośną skrzydła samolotu."}, {"term": "Prawo ciągłości strugi", "category": "Hydrodynamika", "description": "A·v = const — iloczyn pola przekroju i prędkości przepływu jest stały. Gdy rura się zwęża, ciecz przyspiesza (np. dysza węża ogrodowego). Wynika z zasady zachowania masy płynu nieściśliwego."}, {"term": "Oscylator harmoniczny (bez i z tłumieniem)", "category": "Drgania i fale", "description": "Bez tłumienia: równanie ruchu ẍ + ω²x = 0, rozwiązanie x(t) = A·cos(ωt + φ), amplituda stała. Z tłumieniem: pojawia się czynnik e^(−βt), amplituda maleje wykładniczo, drgania zanikają. Częstotliwość przy tłumieniu lekko maleje. Parametry: amplituda A, częstość ω, faza φ, okres T = 2π/ω."}, {"term": "Czym jest fala — rodzaje i własności", "category": "Drgania i fale", "description": "Fala to rozchodzące się w przestrzeni zaburzenie przenoszące energię (nie materię). Rodzaje: mechaniczne / elektromagnetyczne; poprzeczne / podłużne. Własności: długość fali λ, częstotliwość f, prędkość v = λ·f, amplituda A, okres T = 1/f."}, {"term": "Równanie fali biegnącej", "category": "Drgania i fale", "description": "y(x,t) = A·sin(ωt − kx). Gdzie ω = 2πf to częstość kołowa, k = 2π/λ to liczba falowa. Znak minus oznacza falę biegnącą w prawo (w stronę dodatnich x), znak plus — w lewo."}, {"term": "Prawo Coulomba", "category": "Elektryczność", "description": "Siła między dwoma ładunkami punktowymi: F = k·q₁·q₂/r². Jest wprost proporcjonalna do iloczynu ładunków i odwrotnie proporcjonalna do kwadratu odległości. Podwojenie odległości r → siła maleje 4 razy (prawo odwrotnych kwadratów, jak grawitacja)."}, {"term": "Zasada zachowania ładunku", "category": "Elektryczność", "description": "Całkowity ładunek elektryczny w układzie izolowanym jest stały. Ładunek nie powstaje z niczego ani nie znika — może być jedynie przenoszony między ciałami. Suma ładunków przed i po dowolnym procesie jest taka sama."}, {"term": "Pojemność, potencjał, napięcie, natężenie, opór, SEM", "category": "Elektryczność", "description": "Pojemność kondensatora: C = Q/U [F]. Potencjał: V = Ep/q [V] — energia potencjalna na jednostkę ładunku. Napięcie: U = V₁ − V₂ — różnica potencjałów. Natężenie prądu: I = Q/t [A]. Opór: R = U/I [Ω] (prawo Ohma). Opór właściwy: R = ρ·l/S, gdzie ρ jest cechą materiału. SEM (siła elektromotoryczna) — napięcie źródła bez obciążenia."}, {"term": "Prawa Kirchhoffa", "category": "Elektryczność", "description": "I prawo (węzłów): suma prądów wpływających do węzła równa się sumie prądów wypływających — wynika z zasady zachowania ładunku. II prawo (oczek): suma napięć w dowolnej zamkniętej pętli obwodu wynosi zero — wynika z zasady zachowania energii."}, {"term": "Siła Lorentza", "category": "Magnetyzm", "description": "F = q(E + v × B). Część magnetyczna F = q·(v × B) jest zawsze prostopadła do prędkości v i do pola B jednocześnie (iloczyn wektorowy). Dlatego ładunek w polu magnetycznym porusza się po okręgu lub spirali. Siła magnetyczna nie wykonuje pracy (jest prostopadła do ruchu)."}, {"term": "Ruch cząstki naładowanej w polu elektromagnetycznym", "category": "Magnetyzm", "description": "W polu elektrycznym E: siła wzdłuż pola, cząstka przyspiesza po prostej. W polu magnetycznym B (prędkość prostopadła do B): ruch po okręgu o promieniu r = mv/(qB). Gdy prędkość ma składową równoległą do B: ruch po spirali (helisie). Kierunek zakrętu zależy od znaku ładunku."}, {"term": "Zasada działania prądnicy", "category": "Magnetyzm", "description": "Prądnica wykorzystuje indukcję elektromagnetyczną (prawo Faradaya). Ramka wirująca w polu magnetycznym powoduje zmianę strumienia magnetycznego przez nią, co indukuje napięcie (SEM). Zamienia energię mechaniczną (obrót) na energię elektryczną."}, {"term": "Równania Maxwella — interpretacja fizyczna", "category": "Elektromagnetyzm", "description": "1) Prawo Gaussa dla E: źródłem pola elektrycznego są ładunki elektryczne. 2) Prawo Gaussa dla B: nie istnieją monopole magnetyczne, linie pola B są zawsze zamknięte. 3) Prawo Faradaya: zmienne pole magnetyczne indukuje (wytwarza) pole elektryczne. 4) Prawo Ampère'a-Maxwella: prąd elektryczny oraz zmienne pole elektryczne są źródłem pola magnetycznego. Ważna jest interpretacja, nie nazwy."}, {"term": "Wektor indukcji B, natężenie H, strumień", "category": "Magnetyzm", "description": "Wektor indukcji magnetycznej B [T] opisuje pole magnetyczne i siłę działającą na ładunek. Natężenie pola magnetycznego H [A/m], związek: B = μ·H. Strumień magnetyczny: Φ = B·S·cos α [Wb] — liczba linii pola przez powierzchnię. Strumień elektryczny: Φ_E = E·S·cos α."}, {"term": "Dia-, para-, ferromagnetyk; di-, piezo-, piro-, ferroelektryk", "category": "Materiały", "description": "Diamagnetyk: lekko odpycha pole magnetyczne (μ < 1), np. miedź. Paramagnetyk: lekko wzmacnia pole (μ > 1), np. aluminium. Ferromagnetyk: silnie wzmacnia i zachowuje namagnesowanie, np. żelazo. Dielektryk: izolator polaryzujący się w polu E. Piezoelektryk: nacisk → napięcie (i odwrotnie). Piroelektryk: zmiana temperatury → ładunek. Ferroelektryk: trwała polaryzacja (elektryczny odpowiednik ferromagnetyka)."}, {"term": "Indukcja elektrostatyczna i magnetyczna", "category": "Elektromagnetyzm", "description": "Indukcja elektrostatyczna: rozdzielenie ładunków w przewodniku pod wpływem zewnętrznego pola elektrycznego (bez kontaktu). Indukcja magnetyczna (elektromagnetyczna): powstawanie SEM w obwodzie przy zmianie strumienia magnetycznego przez ten obwód — opisuje prawo Faradaya."}, {"term": "Układ termodynamiczny: otwarty, zamknięty, izolowany", "category": "Termodynamika", "description": "Otwarty: wymienia z otoczeniem zarówno energię, jak i materię (np. garnek bez pokrywki). Zamknięty: wymienia energię, ale nie materię (np. szczelnie zamknięty garnek). Izolowany: nie wymienia ani energii, ani materii (idealny termos)."}, {"term": "Gaz doskonały vs rzeczywisty — różnice", "category": "Termodynamika", "description": "Gaz doskonały: pV = nRT. Założenia idealizacji — cząsteczki są punktami (zerowa objętość) i nie oddziałują ze sobą. Gaz rzeczywisty: opisuje równanie Van der Waalsa (p + a/V²)(V − b) = nRT, które uwzględnia objętość własną cząsteczek (b) oraz ich wzajemne przyciąganie (a). Odstępstwa są największe przy wysokich ciśnieniach i niskich temperaturach."}, {"term": "Równania transportu (relacje strumień–siła)", "category": "Termodynamika", "description": "Strumień danej wielkości jest proporcjonalny do siły napędowej (gradientu). Dyfuzja (prawo Ficka): strumień masy proporcjonalny do gradientu stężenia. Przewodnictwo cieplne (prawo Fouriera): strumień ciepła proporcjonalny do gradientu temperatury. Przewodnictwo elektryczne (prawo Ohma): gęstość prądu proporcjonalna do gradientu potencjału."}, {"term": "Zasady termodynamiki (0, 1, 2)", "category": "Termodynamika", "description": "Zerowa: jeśli dwa ciała są w równowadze termicznej z trzecim, to są w równowadze ze sobą (mają tę samą temperaturę). Pierwsza: ΔU = Q − W — zachowanie energii; ciepło i praca zmieniają energię wewnętrzną. Druga: entropia układu izolowanego nie maleje; ciepło samoistnie płynie od ciała cieplejszego do chłodniejszego, nigdy odwrotnie."}, {"term": "Energia wewnętrzna, ciepło, temperatura, entropia", "category": "Termodynamika", "description": "Energia wewnętrzna U: suma energii kinetycznej i potencjalnej wszystkich cząsteczek układu. Ciepło Q: energia przekazywana między ciałami na skutek różnicy temperatur. Temperatura T: miara średniej energii kinetycznej cząsteczek. Entropia S: miara nieuporządkowania (stopnia chaosu) układu; dS = dQ/T."}, {"term": "Ciepło Joule'a-Lenza", "category": "Elektryczność", "description": "Q = I²·R·t. Ilość energii cieplnej wydzielanej w oporniku podczas przepływu prądu. Zależy od kwadratu natężenia prądu — podwojenie I daje 4 razy więcej ciepła. Zasada działania grzałek, żarówek, bezpieczników topikowych."}, {"term": "Opór / pojemność zastępcza", "category": "Elektryczność", "description": "Oporniki: szeregowo R = R₁ + R₂ + ... (sumują się); równolegle 1/R = 1/R₁ + 1/R₂ + ... Kondensatory działają ODWROTNIE: szeregowo 1/C = 1/C₁ + 1/C₂ + ...; równolegle C = C₁ + C₂ + ... (sumują się). Łatwo pomylić — zapamiętaj, że to lustrzane odbicie."}, {"term": "Budowa atomu Bohra", "category": "Fizyka atomowa", "description": "Elektrony krążą wokół jądra po ściśle dozwolonych orbitach o określonej energii (skwantowanych). Na danej orbicie elektron nie wypromieniowuje energii. Przeskok elektronu na niższą orbitę → emisja fotonu, na wyższą → pochłonięcie fotonu. Energia fotonu: ΔE = h·f (różnica energii między orbitami)."}, {"term": "Model pasmowy ciała krystalicznego", "category": "Ciało stałe", "description": "W krysztale poziomy energetyczne atomów łączą się w pasma energetyczne: pasmo walencyjne (elektrony związane), pasmo zabronione/przerwa energetyczna (brak dozwolonych stanów), pasmo przewodnictwa (elektrony swobodne). Szerokość przerwy decyduje o typie materiału: metal (brak przerwy), półprzewodnik (mała przerwa), izolator (duża przerwa)."}, {"term": "Półprzewodniki samoistne i domieszkowe", "category": "Ciało stałe", "description": "Samoistne: czysty materiał (np. krzem, german); nośnikami są elektrony i dziury w równej liczbie. Domieszkowe typ n: domieszka donorowa (np. fosfor) dodaje swobodne elektrony jako nośniki. Domieszkowe typ p: domieszka akceptorowa (np. bor) tworzy dziury jako nośniki. Połączenie obszaru p i n daje złącze p-n — podstawę diod i tranzystorów."}, {"term": "Zasada Fermata i prawa optyki", "category": "Optyka", "description": "Zasada Fermata: światło wybiera drogę, po której czas przejścia jest najmniejszy. Z niej wynikają: prawo odbicia (kąt padania = kąt odbicia) oraz prawo załamania Snella (n₁·sin θ₁ = n₂·sin θ₂). Gdy światło wchodzi do ośrodka gęstszego (większe n), załamuje się w stronę normalnej."}, {"term": "Całkowite wewnętrzne odbicie i światłowody", "category": "Optyka", "description": "Zachodzi, gdy światło przechodzi z ośrodka gęstszego do rzadszego (np. szkło → powietrze) pod kątem padania większym niż kąt graniczny (sin θgr = n₂/n₁). Wtedy światło w ogóle nie wychodzi — całkowicie odbija się z powrotem. To zasada działania światłowodów, w których światło biegnie wzdłuż włókna bez strat."}, {"term": "Emisja spontaniczna i wymuszona — zasada działania lasera", "category": "Optyka", "description": "Emisja spontaniczna: wzbudzony atom oddaje foton samoistnie, w losowym kierunku i fazie. Emisja wymuszona: nadlatujący foton wymusza emisję drugiego, identycznego fotonu (ta sama faza, kierunek, długość fali). Laser potrzebuje inwersji obsadzeń (więcej atomów wzbudzonych niż w stanie podstawowym) oraz rezonatora optycznego. Daje światło spójne, monochromatyczne i ukierunkowane."}];

  let order = [];
  let pos = 0;
  let revealed = false;

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function resetDeck(doShuffle) {
    order = doShuffle ? shuffle(FLASHCARDS_DATA.map((_, i) => i)) : FLASHCARDS_DATA.map((_, i) => i);
    pos = 0;
    revealed = false;
    render();
  }

  function currentCard() {
    return FLASHCARDS_DATA[order[pos]];
  }

  function render() {
    const card = currentCard();
    const cardArea = document.getElementById('cardArea');
    const controlsArea = document.getElementById('controlsArea');

    cardArea.innerHTML = `
      <div class="card" id="cardEl">
        ${card.category ? `<div class="category">${escapeHtml(card.category)}</div>` : ''}
        <div class="term">${escapeHtml(card.term)}</div>
        <div class="hint ${revealed ? 'hidden-when-revealed' : ''}">Kliknij albo wciśnij spację, żeby sprawdzić odpowiedź</div>
        <div class="description ${revealed ? '' : 'hidden'}">${escapeHtml(card.description)}</div>
      </div>
    `;

    document.getElementById('cardEl').addEventListener('click', toggleReveal);

    controlsArea.innerHTML = `
      <button id="shuffleBtn" class="icon-btn" title="Przetasuj fiszki">🔀 Przetasuj</button>
      <div class="nav-group">
        <button id="prevBtn" ${pos === 0 ? 'disabled' : ''}>← Poprzednia</button>
        <button id="revealBtn" class="primary">${revealed ? 'Ukryj' : 'Pokaż odpowiedź'}</button>
        <button id="nextBtn">${pos === order.length - 1 ? 'Zakończ' : 'Następna →'}</button>
      </div>
    `;

    document.getElementById('shuffleBtn').onclick = () => resetDeck(true);
    document.getElementById('prevBtn').onclick = goPrev;
    document.getElementById('revealBtn').onclick = toggleReveal;
    document.getElementById('nextBtn').onclick = goNext;

    document.getElementById('counter').textContent = `${pos + 1} / ${order.length}`;
    document.getElementById('progressFill').style.width = `${((pos + (revealed ? 1 : 0.3)) / order.length) * 100}%`;
  }

  function toggleReveal() {
    revealed = !revealed;
    render();
  }

  function goNext() {
    if (pos < order.length - 1) {
      pos++;
      revealed = false;
      render();
    } else {
      showDone();
    }
  }

  function goPrev() {
    if (pos > 0) {
      pos--;
      revealed = false;
      render();
    }
  }

  function showDone() {
    document.getElementById('cardArea').innerHTML = `
      <div class="done-screen">
        <h2>To wszystkie fiszki w tej talii 🎉</h2>
        <p>Możesz przejść jeszcze raz w nowej losowej kolejności.</p>
      </div>
    `;
    document.getElementById('controlsArea').innerHTML = `
      <div class="nav-group" style="margin: 0 auto;">
        <button id="restartBtn" class="primary">Zacznij od nowa (nowa kolejność)</button>
      </div>
    `;
    document.getElementById('restartBtn').onclick = () => resetDeck(true);
    document.getElementById('progressFill').style.width = '100%';
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); toggleReveal(); }
    if (e.code === 'ArrowRight') goNext();
    if (e.code === 'ArrowLeft') goPrev();
  });

  resetDeck(true);
</script>

</body>
</html>
